<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 櫻花粉・英文單字特訓班 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%; 
            height: -webkit-fill-available;
            height: 100dvh;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Varela Round', 'Noto Sans TC', sans-serif;
            background-color: #fff0f5; 
            background-image: 
                radial-gradient(#fbcfe8 2px, transparent 2px),
                radial-gradient(#fce7f3 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #4c1d95; 
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 3px solid #fbcfe8;
            box-shadow: 0 8px 32px rgba(244, 114, 182, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(244, 114, 182, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(244, 114, 182, 0.8); }

        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; transform: translate3d(0, 0, 0); }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        @keyframes marqueeVertical {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .marquee-container {
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            animation: marqueeVertical 15s linear infinite;
        }
        .marquee-container:hover .marquee-content, 
        .marquee-container:active .marquee-content {
            animation-play-state: paused;
        }
        
        .chat-bubble-me { background: #fdf2f8; border-radius: 1rem 1rem 0 1rem; border: 1px solid #fbcfe8; }
        .chat-bubble-other { background: #ffffff; border-radius: 1rem 1rem 1rem 0; border: 1px solid #fce7f3; }
    </style>

    <script type="application/json" id="app-data">
    {
      "EXAM_DATE": "2027-05-22T00:00:00",
      "LEVELS": ["Level 1", "Level 2", "Level 3", "Level 4", "Level 5", "Level 6"]
    }
    </script>
</head>
<body class="w-full flex flex-col overflow-hidden">

    <div id="app" class="w-full h-full flex flex-col overflow-hidden"></div>
    <div id="modals-container"></div> 

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        //  系統設定與常數
        // ==========================================
        const BASE_FIREBASE_CONFIG = {
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'english-vocabulary';
        
        const appDataRaw = document.getElementById('app-data').textContent;
        const appData = JSON.parse(appDataRaw);
        
        const EXAM_DATE = new Date(appData.EXAM_DATE);
        const LEVELS = appData.LEVELS;

        const USER_COLORS = [
            'bg-[#f472b6] text-white', 'bg-[#fb7185] text-white', 'bg-[#e879f9] text-white',
            'bg-[#c084fc] text-white', 'bg-[#a78bfa] text-white', 'bg-[#818cf8] text-white',
            'bg-[#38bdf8] text-white', 'bg-[#2dd4bf] text-white', 'bg-[#fbbf24] text-white',
            'bg-[#f87171] text-white'
        ];
        
        const getUserColor = (name) => {
            if(!name) return USER_COLORS[0];
            if(usersProfile[name] && usersProfile[name].color) return usersProfile[name].color;
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
        };

        // 資料狀態
        let appInstance, auth, db;
        let currentUser = null;
        let username = '';
        let viewingUser = 'ALL'; 
        let isAdmin = false;
        
        let globalUsers = [];
        let importantDates = [];
        let chatMessages = [];
        let usersProfile = {}; 
        
        let allVocab = {}; 
        let allProgress = {}; 
        let allActivities = {}; 
        let allFavorites = {}; 
        let allWeakness = {}; 
        
        let modalState = { date: '', level: '' };
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); 
        
        let currentLearningBatch = []; // 每次改為 20 個
        let currentPageIndex = 0;      
        let isReviewMode = false;      

        let quizState = { questions: [], currentIndex: 0, correct: 0, wrongWords: [], level: '', mode: '' };

        let unsubUsers, unsubDates, unsubChat, unsubProfile, unsubVocab, unsubProgress, unsubActivity, unsubFav, unsubWeak;
        
        let femaleVoice = null;

        // ==========================================
        //  輔助工具函式
        // ==========================================
        const getDaysLeft = (targetDateStr) => {
            const now = new Date();
            now.setHours(0,0,0,0);
            const target = new Date(targetDateStr);
            target.setHours(0,0,0,0);
            return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
        };

        const formatDate = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const getStoredConfig = () => {
            const stored = localStorage.getItem('study_group_firebase_config');
            if (stored) { try { return JSON.parse(stored); } catch(e) {} }
            if (typeof __firebase_config !== 'undefined') { try { return JSON.parse(__firebase_config); } catch(e) {} }
            return null;
        };

        const getAvatarChar = (u) => {
            if(usersProfile[u] && usersProfile[u].nickname) return usersProfile[u].nickname.charAt(0);
            return u ? u.charAt(0) : '?';
        };

        const getCircleNum = (idx) => {
            const nums = ['➀','➁','➂','➃','➄','➅','➆','➇','➈','➉','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
            return nums[idx] || `(${idx+1})`;
        };

        const escapeQuotes = (str) => {
            if(!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        };

        const initVoice = () => {
            if (!('speechSynthesis' in window)) return;
            const voices = speechSynthesis.getVoices();
            femaleVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google US English')) ||
                          voices.find(v => v.lang.startsWith('en') && v.name.includes('Samantha')) ||
                          voices.find(v => v.lang.startsWith('en') && v.name.includes('Zira')) ||
                          voices.find(v => v.lang.startsWith('en') && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('girl'))) ||
                          voices.find(v => v.lang.startsWith('en-US')) || 
                          voices.find(v => v.lang.startsWith('en'));
        };
        if ('speechSynthesis' in window && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = initVoice;
        }

        window.playAudio = (text, event) => {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!('speechSynthesis' in window)) return;
            speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            if (femaleVoice) utterance.voice = femaleVoice;
            utterance.rate = 0.9; 
            speechSynthesis.speak(utterance);
        };

        // 計算艾賓浩斯複習狀態
        const getEbbinghausStatus = (reviewCount, lastDateStr) => {
            if (!lastDateStr || reviewCount === 0) return { needReview: true, text: '💡 首次複習', color: 'text-rose-500 bg-rose-50 border-rose-200' };
            
            const lastDate = new Date(lastDateStr);
            lastDate.setHours(0,0,0,0);
            const now = new Date();
            now.setHours(0,0,0,0);
            const daysPassed = Math.floor((now - lastDate) / (1000 * 60 * 60 * 24));

            let targetInterval = 1;
            if (reviewCount === 1) targetInterval = 1; 
            else if (reviewCount === 2) targetInterval = 2; 
            else if (reviewCount === 3) targetInterval = 4; 
            else if (reviewCount === 4) targetInterval = 7; 
            else targetInterval = 15; 

            if (daysPassed >= targetInterval) {
                return { needReview: true, text: '🔥 建議複習', color: 'text-red-600 bg-red-50 border-red-300' };
            } else {
                return { needReview: false, text: '✔️ 記憶穩固', color: 'text-green-600 bg-green-50 border-green-300' };
            }
        };

        // ==========================================
        //  UI 渲染函式 - 系統框架與登入
        // ==========================================
        window.renderApp = () => { 
            try {
                document.getElementById('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col relative overflow-hidden bg-white/20"></div>`; 
                renderGlobalModals();
            } catch(e) { console.error("renderApp error", e); }
        };

        window.renderSetup = () => {
            try {
                const container = document.getElementById('view-container');
                const currentConfig = getStoredConfig() || {};
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">
                        <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] shadow-2xl z-10 w-[36rem] max-w-[95vw] border-4 border-pink-300 relative overflow-hidden">
                            <h1 class="text-2xl md:text-3xl font-black text-pink-600 mb-2 drop-shadow-sm text-center">⚙️ 系統資料庫設定</h1>
                            <p class="text-sm text-gray-500 mb-6 text-center font-bold">請填入您的 Firebase API Key 以啟用雲端同步功能</p>
                            <div class="space-y-3 bg-white/60 p-6 rounded-2xl border border-pink-200">
                                <div>
                                    <label class="block text-xs font-bold text-pink-800 mb-1">API Key (必填) *</label>
                                    <input type="text" id="cfg-apiKey" value="${currentConfig.apiKey || ''}" placeholder="AIzaSy..." class="w-full px-3 py-2 rounded-lg border border-pink-200 focus:outline-none focus:border-pink-400 text-sm font-mono">
                                </div>
                            </div>
                            <div class="mt-6 flex gap-3 justify-center">
                                ${currentConfig.apiKey ? `<button onclick="renderLogin()" class="px-5 py-2.5 rounded-xl font-bold text-gray-500 bg-gray-50 border border-gray-200 hover:bg-gray-100 transition-colors">取消</button>` : ''}
                                <button onclick="saveFirebaseConfig()" class="flex-1 bg-gradient-to-r from-pink-400 to-rose-400 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:shadow-lg transition-all">
                                    💾 儲存並啟動系統
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } catch(e) { console.error("renderSetup error", e); }
        };

        window.renderLogin = () => {
            try {
                const container = document.getElementById('view-container');
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">
                        <div class="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-2xl z-10 w-[36rem] max-w-[95vw] text-center border-4 border-pink-300 relative overflow-hidden">
                            <div class="absolute top-4 left-4 text-4xl animate-bounce-slow">🌸</div>
                            <div class="absolute bottom-4 right-4 text-4xl animate-bounce-slow" style="animation-delay: 1s;">📖</div>
                            <button onclick="renderSetup()" class="absolute top-5 right-5 text-pink-300 hover:text-pink-600 transition-colors bg-white/50 p-2 rounded-full border border-pink-200 hover:bg-white" title="系統設定">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            </button>

                            <h1 class="text-3xl md:text-4xl font-black text-pink-600 mb-3 drop-shadow-sm tracking-wide">🌸 櫻花單字特訓班</h1>
                            <h2 class="text-xl font-bold text-rose-500 mb-8 bg-rose-50 inline-block px-6 py-2 rounded-full border border-rose-200 shadow-sm">Level 1 - 6 單字攻克 💯</h2>
                            
                            <div class="bg-white/60 p-6 rounded-3xl border border-pink-200 mb-6 shadow-inner">
                                <p class="text-sm text-pink-600 font-bold mb-3">👇 點擊你的暱稱登入 👇</p>
                                <div class="flex flex-wrap justify-center gap-3">
                                    ${globalUsers.length > 0 ? 
                                        globalUsers.map(u => {
                                            const dispName = usersProfile[u]?.nickname || u;
                                            return `<button onclick="initiateLogin('${u}')" class="flex items-center gap-2 text-md font-bold bg-white border-2 border-pink-200 text-pink-700 hover:bg-pink-50 hover:scale-105 py-1.5 pl-2 pr-4 rounded-xl shadow-sm transition-all">
                                                <div class="${getUserColor(u)} w-8 h-8 rounded-full flex items-center justify-center text-sm font-black shadow-sm border-2 border-white shrink-0">${getAvatarChar(u)}</div>
                                                <span>${dispName}</span>
                                            </button>`;
                                        }).join('') 
                                        : `<span class="text-sm text-gray-400">尚無學習者，請點擊下方註冊</span>`
                                    }
                                </div>
                            </div>
                            
                            <div class="flex gap-2 w-full mt-2">
                                <button onclick="openProfileEditModal('', true)" class="w-full bg-gradient-to-r from-pink-400 to-rose-400 text-white font-black py-4 px-6 text-xl rounded-2xl shadow-md hover:shadow-lg transition-all transform hover:scale-[1.02]">
                                    🚀 註冊新帳號
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } catch(e) { console.error("renderLogin error", e); }
        };

        window.renderMain = () => {
            try {
                const container = document.getElementById('view-container');
                container.innerHTML = `
                    <div class="bg-white/80 backdrop-blur-md border-b-2 border-pink-200 p-3 flex justify-between items-center shadow-sm shrink-0 z-20 relative">
                        <div class="flex items-center gap-4 pl-2">
                            <h1 class="text-2xl md:text-3xl font-black text-pink-600 tracking-wider">🌸 櫻花單字特訓班</h1>
                        </div>
                        <div class="flex items-center gap-2 md:gap-3 pr-2 flex-wrap justify-end">
                            ${isAdmin ? `<button onclick="window.open('migration_tool.html', '_blank')" class="bg-gradient-to-r from-amber-400 to-orange-400 text-white font-bold px-3 py-1.5 rounded-lg shadow-sm hover:scale-105 transition-transform text-sm shrink-0 hidden lg:block">⚙️ 題庫管理</button>` : ''}
                            
                            <button onclick="openEbbinghausCamp()" class="font-bold text-pink-700 bg-pink-100 px-2 md:px-3 py-1.5 rounded-lg border border-pink-300 shadow-sm hover:bg-pink-200 transition-colors text-sm flex items-center gap-1 shrink-0">
                                🧠 <span class="hidden md:inline">智能複習</span>
                            </button>

                            <button onclick="openScoreBoard()" class="font-bold text-indigo-600 bg-indigo-50 px-2 md:px-3 py-1.5 rounded-lg border border-indigo-200 shadow-sm hover:bg-indigo-100 transition-colors text-sm flex items-center gap-1 shrink-0">
                                📊 <span class="hidden md:inline">成績總覽</span>
                            </button>

                            <button onclick="openWeaknessCamp()" class="font-bold text-red-600 bg-red-50 px-2 md:px-3 py-1.5 rounded-lg border border-red-200 shadow-sm hover:bg-red-100 transition-colors text-sm flex items-center gap-1 shrink-0">
                                🔥 <span class="hidden md:inline">錯題集中營</span>
                            </button>

                            <button onclick="openProgressModal()" class="font-bold text-rose-600 bg-rose-50 px-2 md:px-3 py-1.5 rounded-lg border border-rose-200 shadow-sm hover:bg-rose-100 transition-colors text-sm flex items-center gap-1 shrink-0">
                                📈 <span class="hidden md:inline">進度追蹤</span>
                            </button>
                            
                            <button onclick="openProfileEditModal('${username}')" class="font-bold text-pink-600 bg-pink-50 px-2 md:px-3 py-1.5 rounded-lg border border-pink-200 shadow-sm hover:bg-pink-100 transition-colors text-sm flex items-center gap-1 shrink-0">
                                <div class="${getUserColor(username)} w-5 h-5 rounded-full flex items-center justify-center text-[10px] shadow-sm">${getAvatarChar(username)}</div>
                                <span class="hidden md:inline">我的資料卡</span>
                            </button>
                            
                            <button onclick="logout()" class="text-gray-500 hover:bg-gray-100 font-bold px-2 md:px-3 py-1.5 rounded-lg transition-colors text-sm border border-gray-200 bg-white shadow-sm shrink-0">登出 👋</button>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                        <div class="w-full md:w-60 lg:w-72 flex flex-col bg-white/50 border-b-2 md:border-b-0 md:border-r-2 border-pink-100 z-10 shrink-0 h-full min-h-0">
                            <div id="sidebar-countdowns" class="p-4 flex flex-col border-b-2 border-pink-100 shrink-0 h-[45%] min-h-[250px] relative overflow-hidden"></div>
                            <div class="flex-1 flex flex-col bg-white/60 overflow-hidden relative min-h-0">
                                <div class="bg-pink-100/50 p-2 text-center font-bold text-pink-600 border-b border-pink-100 text-sm shadow-sm shrink-0">💬 加油打氣留言板</div>
                                <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar text-sm relative min-h-0"></div>
                                
                                <div class="p-2 bg-white flex flex-col border-t border-pink-100 relative shrink-0">
                                    <div id="emoji-picker" class="hidden absolute bottom-full left-2 mb-2 bg-white border border-pink-200 p-2 rounded-xl shadow-lg grid grid-cols-5 gap-2 z-50">
                                        ${['😀','😂','🥰','😎','🥺','💪','🔥','💯','📚','🎓','🌸','🎉','📝','🏆','💖'].map(e => `<button onclick="insertEmoji('${e}')" class="text-xl hover:scale-125 transition-transform">${e}</button>`).join('')}
                                    </div>
                                    <div class="flex gap-1.5 items-center w-full">
                                        <button id="emoji-toggle-btn" onclick="toggleEmojiPicker(event)" class="text-2xl hover:bg-pink-50 px-1 rounded-lg transition-colors shrink-0">😀</button>
                                        <div class="flex-1 min-w-0">
                                            <input type="text" id="chatInput" placeholder="說點什麼..." class="w-full px-3 py-2 rounded-lg border border-pink-200 focus:outline-none focus:border-pink-400 bg-pink-50 text-sm" onkeypress="if(event.key === 'Enter') sendChat()">
                                        </div>
                                        <button onclick="sendChat()" class="bg-pink-400 text-white px-3 py-2 rounded-lg font-bold hover:bg-pink-500 transition-colors shrink-0 whitespace-nowrap text-sm">送出</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 bg-white/30 p-4 flex flex-col relative z-0 min-w-0">
                            <div class="flex justify-between items-center mb-4 bg-white/80 p-3 rounded-2xl border border-pink-100 shadow-sm shrink-0">
                                <button onclick="changeMonth(-1)" class="px-3 py-1.5 md:px-4 md:py-2 bg-pink-50 border border-pink-200 hover:bg-pink-100 text-pink-600 rounded-xl font-bold transition-colors shadow-sm text-sm md:text-base whitespace-nowrap">◀ 上個月</button>
                                <div class="flex flex-col items-center flex-1 mx-2 overflow-hidden" id="calendar-header-container"></div>
                                <button onclick="changeMonth(1)" class="px-3 py-1.5 md:px-4 md:py-2 bg-pink-50 border border-pink-200 hover:bg-pink-100 text-pink-600 rounded-xl font-bold transition-colors shadow-sm text-sm md:text-base whitespace-nowrap">下個月 ▶</button>
                            </div>
                            <div id="calendar-grid" class="flex-1 flex flex-col min-h-0"></div>
                        </div>

                        <div class="w-full md:w-60 lg:w-72 flex flex-col bg-white/60 z-10 shrink-0 border-l-2 border-pink-200 min-h-0 h-full shadow-[-4px_0_15px_rgba(244,114,182,0.05)]">
                            <div class="bg-gradient-to-r from-pink-200 to-rose-200 p-2 text-center font-bold text-rose-700 shadow-sm shrink-0 text-sm flex justify-center items-center gap-1">❤️ 我的最愛單字</div>
                            <div id="favorites-feed" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar"></div>
                        </div>
                    </div>
                `;
                if (username) {
                    window.renderSidebar();
                    window.renderMainContent();
                    window.renderChat();
                }

            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('prof-photo-upload').dataset.base64 = base64;
                    document.getElementById('prof-photo-preview').src = base64;
                    document.getElementById('prof-photo-preview').classList.remove('hidden');
                    document.getElementById('prof-photo-placeholder').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);

                `;

                const firstDay = new Date(currentYear, currentMonth, 1).getDay();
                const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
                const startPad = firstDay === 0 ? 6 : firstDay - 1;

                let html = `<div class="grid grid-cols-7 gap-1 md:gap-2 mb-2 shrink-0">`;
                ['一', '二', '三', '四', '五', '六', '日'].forEach((d, idx) => {
                    const isWeekend = idx >= 5;
                    html += `<div class="text-center font-bold ${isWeekend ? 'text-rose-500 bg-rose-50' : 'text-pink-700 bg-pink-50'} py-1 md:py-2 text-sm md:text-base rounded-lg md:rounded-xl shadow-sm border border-gray-100">${d}</div>`;
                });
                html += `</div><div class="grid grid-cols-7 gap-1 md:gap-2 flex-1 auto-rows-[100px] md:auto-rows-[120px] overflow-y-auto custom-scrollbar pb-4 pr-1 pl-1">`;

                for(let i=0; i<startPad; i++) html += `<div class="bg-white/30 rounded-xl md:rounded-2xl border border-transparent"></div>`;

                for(let d=1; d<=daysInMonth; d++) {
                    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const isToday = dateStr === formatDate(new Date());
                    const isImportant = importantDates.find(i => i.date === dateStr);
                    
                    const headerClass = isToday 
                        ? 'bg-gradient-to-r from-pink-400 to-rose-400 text-white shadow-md' 
                        : isImportant 
                            ? 'bg-gradient-to-r from-orange-400 to-red-400 text-white shadow-md' 
                            : 'bg-pink-50 text-pink-700';

                    // 計算當日是否有活動
                    let activeUsers = new Set();
                    Object.values(allActivities).forEach(act => {
                        if(act.date === dateStr && (viewingUser === 'ALL' || act.user === viewingUser)) {
                            activeUsers.add(act.user);
                        }
                    });

                    const clickAction = (viewingUser === username || viewingUser === 'ALL') 
                        ? `openLevelModal('${dateStr}')` 
                        : '';
                    
                    const avatarsHtml = activeUsers.size > 0 ? Array.from(activeUsers).map(u => `
                        <div class="${getUserColor(u)} w-5 h-5 md:w-6 md:h-6 rounded-full flex items-center justify-center text-[10px] md:text-xs font-bold shadow-sm" title="${usersProfile[u]?.nickname || u}">
                            ${getAvatarChar(u)}
                        </div>
                    `).join('') : '';

                    let cellHTML = `
                        <div onclick="${clickAction}" class="bg-white border-2 border-pink-100 p-1 md:p-2 rounded-xl md:rounded-2xl shadow-sm flex flex-col transition-all cursor-pointer hover:border-pink-400 hover:shadow-md hover:-translate-y-1 overflow-hidden group relative h-full">
                            <div class="flex justify-between items-start shrink-0 mb-1 w-full">
                                <span class="w-5 h-5 md:w-7 md:h-7 flex items-center justify-center rounded-full text-xs md:text-sm font-bold ${headerClass} shrink-0">${d}</span>
                                ${isImportant ? `<span class="text-xs md:text-sm drop-shadow-sm group-hover:scale-125 transition-transform shrink-0" title="${isImportant.title}">🔥</span>` : ''}
                            </div>
                            <div class="flex flex-wrap justify-start gap-1 w-full mt-1 overflow-y-auto custom-scrollbar">
                                ${avatarsHtml}
                            </div>
                        </div>
                    `;

                    html += cellHTML;
                }
                html += `</div>`;
                container.innerHTML = html;
            } catch(e) { console.error("renderCalendar error", e); }
        };

        window.renderMainContent = () => {
            try {
                if(window.renderCalendar) window.renderCalendar();
                if(window.renderFavorites) window.renderFavorites();
            } catch(e) { console.error("renderMainContent error", e); }
        };

        // ==========================================
        //  全新艾賓浩斯智能複習營邏輯
        // ==========================================
        window.openEbbinghausCamp = () => {
            try {
                const container = document.getElementById('ebbinghaus-camp-content');
                let hasAnyProgress = false;
                let html = '<div class="space-y-6">';
                
                LEVELS.forEach(lvl => {
                    const progressDocId = `${username}_${lvl}`;
                    const lastIndex = allProgress[progressDocId]?.lastIndex || 0;
                    
                    if (lastIndex > 0) {
                        hasAnyProgress = true;
                        html += `
                            <div class="bg-white rounded-3xl p-5 md:p-8 shadow-sm border-2 border-pink-100">
                                <h3 class="text-2xl font-black text-pink-700 mb-5 border-b-2 border-pink-100 pb-3 flex items-center gap-2">
                                    📚 ${lvl} 
                                    <span class="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full ml-2">已學 ${lastIndex} 字</span>
                                </h3>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                        `;
                        
                        const stagesCount = Math.ceil(lastIndex / 20);
                        for (let s = 0; s < stagesCount; s++) {
                            const startIndex = s * 20;
                            const endIndex = Math.min(startIndex + 20, lastIndex); 
                            
                            const stagesData = allProgress[progressDocId]?.stages || {};
                            const stageInfo = stagesData[startIndex] || { reviewCount: 0, lastReviewDate: null };
                            
                            const status = getEbbinghausStatus(stageInfo.reviewCount, stageInfo.lastReviewDate);
                            
                            html += `
                                <div onclick="openEbbinghausStage('${lvl}', ${startIndex}, ${endIndex})" class="cursor-pointer border-2 ${status.needReview ? 'border-red-300 hover:border-red-400 bg-red-50/50' : 'border-fuchsia-200 hover:border-fuchsia-400 bg-white'} rounded-2xl p-5 flex flex-col gap-2 hover:shadow-lg transition-all group transform hover:-translate-y-1 relative overflow-hidden">
                                    <div class="absolute -right-4 -top-4 text-5xl opacity-10 font-black italic">#${s+1}</div>
                                    <div class="flex justify-between items-start z-10">
                                        <h4 class="font-black text-xl text-gray-800">關卡 ${s+1}</h4>
                                        <span class="text-[10px] md:text-xs font-bold px-2 py-1 rounded-md border ${status.color} shadow-sm">${status.text}</span>
                                    </div>
                                    <div class="text-xs font-bold text-gray-500 z-10 mb-2">單字範圍: ${startIndex + 1} - ${endIndex} 字</div>
                                    
                                    <div class="flex justify-between items-end mt-auto pt-3 text-sm border-t border-gray-200/50 z-10">
                                        <div class="text-gray-500 font-bold">
                                            <div class="text-[10px] mb-0.5">🗓️ 上次複習</div>
                                            <div class="text-gray-700">${stageInfo.lastReviewDate || '尚無紀錄'}</div>
                                        </div>
                                        <div class="text-fuchsia-600 font-black bg-fuchsia-100 px-3 py-1.5 rounded-lg border border-fuchsia-200">
                                            🔄 ${stageInfo.reviewCount} 次
                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                        html += `</div></div>`;
                    }
                });
                html += '</div>';
                
                if (!hasAnyProgress) {
                    html = `
                        <div class="flex flex-col items-center justify-center py-20 text-gray-500">
                            <div class="text-7xl mb-6 drop-shadow-md">🌱</div>
                            <h3 class="text-2xl md:text-3xl font-black text-pink-500 drop-shadow-sm mb-3">尚未有學習紀錄</h3>
                            <p class="text-sm md:text-md font-bold text-gray-400">請先在日曆上點擊日期進入「單字特訓」進行學習，<br>有了紀錄後就可以在這裡進行艾賓浩斯智能複習喔！🚀</p>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
                openGlobalModal('ebbinghaus-camp-modal');
            } catch(e) { console.error("openEbbinghausCamp error", e); }
        };

        window.openEbbinghausStage = (level, startIndex, endIndex) => {
            try {
                document.getElementById('ebbinghaus-study-badge').innerText = `${level} (第 ${startIndex + 1} ~ ${endIndex} 字)`;
                
                const levelWords = Object.values(allVocab).filter(v => v.level === level).sort((a,b) => a.index - b.index);
                const stageWords = levelWords.slice(startIndex, endIndex);
                
                let html = '<div class="space-y-4 w-full">';
                stageWords.forEach(w => {
                    const favId = `${username}_${w.id}`;
                    const isFav = !!allFavorites[favId];
                    const safeWord = escapeQuotes(w.word);
                    const safeSentence = escapeQuotes(w.sentence);
                    
                    html += `
                        <div class="bg-white p-5 rounded-2xl border-2 border-fuchsia-100 shadow-sm flex items-start gap-3 md:gap-4 relative hover:shadow-md transition-shadow group">
                            <button onclick="toggleFavorite('${w.id}', event)" class="text-2xl md:text-3xl hover:scale-125 transition-transform shrink-0 pt-0.5" title="收藏">
                                ${isFav ? '❤️' : '🤍'}
                            </button>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                                    <button onclick="playAudio('${safeWord}', event)" class="w-8 h-8 md:w-10 md:h-10 bg-fuchsia-50 text-fuchsia-600 rounded-full flex items-center justify-center hover:bg-fuchsia-100 border border-fuchsia-200 shrink-0 text-sm shadow-sm">🔊</button>
                                    <h4 class="font-black text-xl md:text-2xl text-gray-800 break-words">${w.word}</h4>
                                    <span class="text-[10px] md:text-xs font-bold text-gray-400 bg-gray-50 px-2 py-0.5 rounded border border-gray-200 ml-1">#${w.index}</span>
                                </div>
                                <div class="text-sm md:text-base font-bold text-fuchsia-600 mb-2 pl-1"><span class="text-gray-400 mr-1.5">${w.pos}</span>${w.meaning}</div>
                                ${w.sentence ? `
                                    <div class="bg-fuchsia-50/50 p-3 rounded-xl text-sm border border-fuchsia-100 flex items-start gap-2.5">
                                        <button onclick="playAudio('${safeSentence}', event)" class="w-6 h-6 md:w-7 md:h-7 bg-white text-fuchsia-400 rounded-full flex items-center justify-center hover:bg-fuchsia-100 transition-colors shadow-sm shrink-0 border border-fuchsia-200 text-[10px] mt-0.5">🔊</button>
                                        <div class="flex flex-col gap-1">
                                            <div class="text-gray-700 font-medium leading-snug">${w.sentence}</div>
                                            <div class="text-gray-400 text-xs">${w.translation}</div>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                
                document.getElementById('ebbinghaus-study-content').innerHTML = html;
                document.getElementById('ebbinghaus-study-content').scrollTop = 0;
                
                const btn = document.getElementById('ebbinghaus-complete-btn');
                btn.onclick = () => completeEbbinghausStage(level, startIndex);
                
                openGlobalModal('ebbinghaus-study-modal');
            } catch(e) { console.error("openEbbinghausStage error", e); }
        };

        window.completeEbbinghausStage = async (level, startIndex) => {
            const progressDocId = `${username}_${level}`;
            const currentData = allProgress[progressDocId] || {};
            const stages = currentData.stages || {};
            const stageData = stages[startIndex] || { reviewCount: 0 };
            
            stages[startIndex] = {
                reviewCount: stageData.reviewCount + 1,
                lastReviewDate: formatDate(new Date())
            };

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabProgress', progressDocId), {
                    stages: stages,
                    updatedAt: new Date().toISOString()
                }, { merge: true });
                
                alert(`🎉 恭喜完成複習！本關卡已複習 ${stageData.reviewCount + 1} 次。`);
                closeGlobalModal('ebbinghaus-study-modal');
                openEbbinghausCamp(); // 重新整理營地視圖
            } catch (e) {
                console.error(e);
                alert("儲存進度失敗！");
            }
        };

        // ==========================================
        //  全新學習流程：選擇 Level 與 學習列表
        // ==========================================
        window.openLevelModal = (dateStr) => {
            try {
                document.getElementById('level-modal-date').innerText = `選擇日期: ${dateStr}`;
                modalState.date = dateStr;
                
                const levelContainer = document.getElementById('level-buttons-container');
                levelContainer.innerHTML = LEVELS.map(lvl => `<button onclick="startLearning('${lvl}')" class="py-4 rounded-xl border-2 border-pink-200 text-pink-600 font-black text-lg hover:bg-pink-500 hover:text-white transition-all bg-white shadow-sm hover:scale-[1.02]">${lvl}</button>`).join('');
                
                let hasAnyProgress = false;
                let currentSelectedLevel = modalState.level || LEVELS[0]; 

                LEVELS.forEach(lvl => {
                    const docId = `${username}_${lvl}`;
                    if(allProgress[docId] && allProgress[docId].lastIndex > 0) hasAnyProgress = true;
                });

                const actionContainer = document.getElementById('level-actions-container');
                if (hasAnyProgress) {
                    actionContainer.classList.remove('hidden');
                    actionContainer.innerHTML = `
                        <p class="text-xs text-center font-bold text-gray-400 mb-1">您已有學習紀錄，可進行隨堂測驗 👇</p>
                        <div class="flex gap-2 w-full">
                            <select id="action-level-select" class="w-1/3 px-2 py-2 rounded-lg border border-gray-300 font-bold text-pink-600 focus:outline-none">
                                ${LEVELS.map(lvl => `<option value="${lvl}" ${lvl === currentSelectedLevel ? 'selected' : ''}>${lvl}</option>`).join('')}
                            </select>
                            <button onclick="startQuiz('level', document.getElementById('action-level-select').value)" class="w-full py-2.5 rounded-lg font-black text-white bg-rose-500 hover:bg-rose-600 shadow-sm transition-all text-sm md:text-base">
                                📝 模擬隨機測驗
                            </button>
                        </div>
                    `;
                } else {
                    actionContainer.classList.add('hidden');
                    actionContainer.innerHTML = '';
                }

                openGlobalModal('level-select-modal');
            } catch(e) { console.error("openLevelModal error", e); }
        };

        window.startLearning = (level) => {
            try {
                const progressDocId = `${username}_${level}`;
                const currentIndex = allProgress[progressDocId]?.lastIndex || 0;
                
                const levelWords = Object.values(allVocab).filter(v => v.level === level).sort((a,b) => a.index - b.index);
                
                currentLearningBatch = levelWords.slice(currentIndex, currentIndex + 20);
                
                if(currentLearningBatch.length === 0) {
                    alert(`恭喜！您已學完 ${level} 的所有題庫單字！`);
                    return;
                }
                
                currentPageIndex = 0;
                isReviewMode = false;
                modalState.level = level;
                
                document.getElementById('learning-modal-title-badge').innerText = `${level} (第 ${currentIndex + 1} ~ ${currentIndex + currentLearningBatch.length} 字)`;
                
                closeGlobalModal('level-select-modal');
                renderLearningPage();
                openGlobalModal('learning-modal');
            } catch(e) { console.error("startLearning error", e); }
        };

        window.renderLearningPage = () => {
            try {
                const start = currentPageIndex * 10;
                const end = start + 10;
                const pageWords = currentLearningBatch.slice(start, end);
                
                let html = '<div class="space-y-4 w-full px-1">';
                
                pageWords.forEach((wordObj, i) => {
                    const favId = `${username}_${wordObj.id}`;
                    const isFav = !!allFavorites[favId];
                    
                    const safeWord = escapeQuotes(wordObj.word);
                    const safeSentence = escapeQuotes(wordObj.sentence);
                    
                    html += `
                        <div class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-pink-200 relative hover:shadow-md transition-shadow">
                            <div class="absolute top-3 left-4 text-xs font-bold text-gray-400 bg-gray-50 px-2 py-0.5 rounded border border-gray-100"># ${wordObj.index}</div>
                            <button onclick="toggleFavorite('${wordObj.id}', event)" class="absolute top-3 right-4 text-xl hover:scale-125 transition-transform" title="加入我的最愛">
                                ${isFav ? '❤️' : '🤍'}
                            </button>
                            
                            <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4 mt-6 mb-3">
                                <div class="flex items-center gap-3">
                                    <button onclick="playAudio('${safeWord}', event)" class="w-9 h-9 bg-pink-50 text-pink-600 rounded-full flex items-center justify-center hover:bg-pink-100 transition-colors shadow-sm shrink-0 border border-pink-200">
                                        🔊
                                    </button>
                                    <h3 class="text-2xl font-black text-gray-800">${wordObj.word}</h3>
                                </div>
                                <div class="text-rose-600 font-bold ml-1 md:ml-2">
                                    <span class="text-gray-400 mr-1">${wordObj.pos}</span> ${wordObj.meaning}
                                </div>
                            </div>
                            
                            ${wordObj.sentence ? `
                                <div class="bg-rose-50/50 rounded-xl p-3 flex items-start gap-3 border border-rose-100">
                                    <button onclick="playAudio('${safeSentence}', event)" class="w-7 h-7 bg-white text-rose-400 rounded-full flex items-center justify-center hover:bg-rose-50 transition-colors shadow-sm shrink-0 border border-rose-200 mt-0.5 text-xs">
                                        🔊
                                    </button>
                                    <div class="flex flex-col gap-1">
                                        <div class="text-gray-700 font-medium text-sm md:text-base">${wordObj.sentence}</div>
                                        <div class="text-sm text-gray-500">${wordObj.translation}</div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                html += '</div>';
                
                document.getElementById('learning-content').innerHTML = html;
                
                const totalPages = Math.ceil(currentLearningBatch.length / 10);
                document.getElementById('learning-page-indicator').innerText = `頁次 ${currentPageIndex + 1} / ${totalPages}`;
                
                const btnPrev = document.getElementById('btn-prev-page');
                const btnNext = document.getElementById('btn-next-page');
                
                if(currentPageIndex > 0) btnPrev.classList.remove('invisible');
                else btnPrev.classList.add('invisible');
                
                if(currentPageIndex >= totalPages - 1) {
                    btnNext.innerText = '完成學習，進入測驗 ⚔️';
                    btnNext.classList.replace('bg-pink-500', 'bg-orange-500');
                    btnNext.classList.replace('hover:bg-pink-600', 'hover:bg-orange-600');
                } else {
                    btnNext.innerText = '下一頁 ▶';
                    btnNext.classList.replace('bg-orange-500', 'bg-pink-500');
                    btnNext.classList.replace('hover:bg-orange-600', 'hover:bg-pink-600');
                }
                
                document.getElementById('learning-content').scrollTop = 0;
            } catch(e) { console.error("renderLearningPage error", e); }
        };

        window.prevPage = () => {
            if(currentPageIndex > 0) {
                currentPageIndex--;
                renderLearningPage();
            }
        };

        window.nextPage = async () => {
            const totalPages = Math.ceil(currentLearningBatch.length / 10);
            
            if(currentPageIndex >= totalPages - 1) {
                alert("進入隨機測驗！必須完成該單元全數 20 題的測驗，系統才會記錄進度喔！");
                startQuiz('post_learning', modalState.level);
            } else {
                currentPageIndex++;
                renderLearningPage();
            }
        };

        // ==========================================
        //  情境填空測驗 (Quiz Mode) 邏輯
        // ==========================================
        window.startQuiz = (mode, level) => {
            try {
                let pool = [];
                if (mode === 'post_learning') {
                    pool = [...currentLearningBatch];
                } else if (mode === 'level') {
                    const progressDocId = `${username}_${level}`;
                    const learnedCount = allProgress[progressDocId]?.lastIndex || 0;
                    const levelWords = Object.values(allVocab).filter(v => v.level === level).sort((a,b) => a.index - b.index);
                    pool = levelWords.slice(0, learnedCount);
                    if (pool.length < 4) {
                        alert("已學習的單字數量不足，無法進行測驗！（至少需要 4 個單字）");
                        return;
                    }
                    pool = pool.sort(() => 0.5 - Math.random()).slice(0, 20);
                }

                quizState = {
                    level: level,
                    mode: mode,
                    questions: pool.sort(() => 0.5 - Math.random()), 
                    currentIndex: 0,
                    correct: 0,
                    wrongWords: []
                };

                closeGlobalModal('learning-modal');
                closeGlobalModal('level-select-modal');
                
                renderQuizQuestion();
                openGlobalModal('quiz-modal');
            } catch(e) { console.error("startQuiz error", e); }
        };

        window.renderQuizQuestion = () => {
            try {
                const total = quizState.questions.length;
                const current = quizState.currentIndex;
                
                const pct = (current / total) * 100;
                document.getElementById('quiz-progress-bar').style.width = `${pct}%`;
                document.getElementById('quiz-progress-badge').innerText = `第 ${current + 1} / ${total} 題`;

                const wordObj = quizState.questions[current];
                const correctWordStr = wordObj.word;
                const safeCorrectWord = escapeQuotes(correctWordStr);

                let allOthers = Object.values(allVocab).filter(v => v.word !== correctWordStr);
                allOthers = allOthers.sort(() => 0.5 - Math.random()).slice(0, 3);
                
                const options = [wordObj, ...allOthers].sort(() => 0.5 - Math.random());

                let questionHtml = '';
                if (wordObj.sentence) {
                    const regex = new RegExp(`\\b${correctWordStr}\\b`, 'gi');
                    const blankedSentence = wordObj.sentence.replace(regex, '________');
                    
                    questionHtml = `
                        <div class="text-sm font-bold text-rose-500 mb-2">請選出適合填入空格的單字：</div>
                        <div id="quiz-sentence-display" class="text-2xl md:text-4xl font-black text-gray-800 leading-relaxed mb-4 px-4 tracking-wide">${blankedSentence}</div>
                        <div class="text-gray-500 font-bold bg-white inline-block px-5 py-2 rounded-full border border-rose-100 shadow-sm text-lg">💡 提示：${wordObj.meaning}</div>
                        
                        <div id="quiz-explanation" class="hidden mt-6 bg-pink-50 p-6 rounded-2xl border border-pink-200 text-left mx-auto max-w-2xl w-full shadow-inner">
                            <div class="text-xl md:text-2xl font-black text-rose-600 mb-3 leading-relaxed">${wordObj.sentence}</div>
                            <div class="text-md md:text-lg text-gray-700 font-bold mb-1">${wordObj.translation}</div>
                        </div>
                    `;
                } else {
                    questionHtml = `
                        <div class="text-sm font-bold text-rose-500 mb-2">請選出符合以下意思的單字：</div>
                        <div class="text-3xl md:text-5xl font-black text-gray-800 leading-relaxed mb-4 px-4">${wordObj.meaning}</div>
                        
                        <div id="quiz-explanation" class="hidden mt-6 bg-pink-50 p-6 rounded-2xl border border-pink-200 w-full shadow-inner">
                            <div class="text-xl md:text-2xl font-black text-rose-600">${wordObj.word}</div>
                        </div>
                    `;
                }

                const optionsHtml = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8 w-full max-w-2xl mx-auto">
                        ${options.map(opt => `
                            <button onclick="checkQuizAnswer(this, '${escapeQuotes(opt.word)}', '${safeCorrectWord}')" data-word="${escapeQuotes(opt.word)}" class="quiz-option-btn py-5 px-6 rounded-2xl bg-white border-2 border-rose-200 text-gray-700 font-black text-xl md:text-2xl shadow-sm hover:bg-rose-50 hover:border-rose-400 hover:scale-[1.02] transition-all">
                                ${opt.word}
                            </button>
                        `).join('')}
                    </div>
                `;

                const nextBtnHtml = `
                    <div id="quiz-next-btn-container" class="hidden mt-10">
                        <button onclick="nextQuizQuestion()" class="px-10 py-4 bg-rose-500 text-white font-black rounded-xl hover:bg-rose-600 shadow-md text-xl animate-bounce">下一題 ▶</button>
                    </div>
                `;

                document.getElementById('quiz-question-container').innerHTML = questionHtml + optionsHtml + nextBtnHtml;
            } catch(e) { console.error("renderQuizQuestion error", e); }
        };

        window.checkQuizAnswer = async (btn, selectedWord, correctWord) => {
            try {
                const btns = document.querySelectorAll('.quiz-option-btn');
                btns.forEach(b => {
                    b.disabled = true;
                    b.classList.remove('hover:bg-rose-50', 'hover:border-rose-400', 'hover:scale-[1.02]');
                });

                const isCorrect = (selectedWord === correctWord);
                const currentObj = quizState.questions[quizState.currentIndex];

                if (isCorrect) {
                    btn.classList.replace('bg-white', 'bg-green-400');
                    btn.classList.replace('border-rose-200', 'border-green-500');
                    btn.classList.replace('text-gray-700', 'text-white');
                    quizState.correct++;
                } else {
                    btn.classList.replace('bg-white', 'bg-red-500');
                    btn.classList.replace('border-rose-200', 'border-red-600');
                    btn.classList.replace('text-gray-700', 'text-white');
                    btn.classList.add('shake');
                    
                    const correctBtn = Array.from(btns).find(b => b.dataset.word === correctWord);
                    if (correctBtn) {
                        correctBtn.classList.replace('bg-white', 'bg-green-400');
                        correctBtn.classList.replace('border-rose-200', 'border-green-500');
                        correctBtn.classList.replace('text-gray-700', 'text-white');
                    }

                    if (!quizState.wrongWords.find(w => w.id === currentObj.id)) {
                        quizState.wrongWords.push(currentObj);
                    }
                }

                const exp = document.getElementById('quiz-explanation');
                if (exp) exp.classList.remove('hidden');
                
                const senDisp = document.getElementById('quiz-sentence-display');
                if (senDisp && currentObj.sentence) senDisp.classList.add('hidden');
                
                document.getElementById('quiz-next-btn-container').classList.remove('hidden');

                if (currentObj.sentence) {
                    playAudio(currentObj.sentence, null);
                } else {
                    playAudio(correctWord, null);
                }
            } catch(e) { console.error("checkQuizAnswer error", e); }
        };

        window.nextQuizQuestion = () => {
            quizState.currentIndex++;
            if (quizState.currentIndex >= quizState.questions.length) {
                finishQuiz();
            } else {
                renderQuizQuestion();
            }
        };

        window.finishQuiz = async () => {
            const total = quizState.questions.length;
            const correct = quizState.correct;
            const score = correct; 

            if (quizState.mode === 'post_learning') {
                const progressDocId = `${username}_${quizState.level}`;
                const currentIndex = allProgress[progressDocId]?.lastIndex || 0;
                
                if (!isReviewMode) {
                    const newIndex = currentIndex + currentLearningBatch.length;
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabProgress', progressDocId), {
                            user: username,
                            level: quizState.level,
                            lastIndex: newIndex,
                            updatedAt: new Date().toISOString()
                        }, { merge: true });
                    } catch(e) { console.error(e); }
                }
                
                const activityId = `${username}_${modalState.date}_${Date.now()}`;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabActivity', activityId), {
                        user: username,
                        date: modalState.date,
                        level: quizState.level,
                        wordsLearned: currentLearningBatch.length,
                        timestamp: new Date().toISOString()
                    });
                } catch(e) { console.error(e); }
            }

            if (quizState.wrongWords.length > 0) {
                try {
                    for(let w of quizState.wrongWords) {
                        const weakId = `${username}_${w.id}`;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabWeakness', weakId), {
                            user: username,
                            wordId: w.id,
                            wordObj: w,
                            addedAt: new Date().toISOString()
                        }, { merge: true });
                    }
                } catch(e) { console.error("Error saving weaknesses", e); }
            }

            let grade = 'C 級';
            let icon = '🎯';
            let msg = '再接再厲！錯題已經幫您整理到集中營囉。';
            
            if (score >= total) {
                grade = 'S 級'; icon = '👑'; msg = '太神啦！完美無瑕！完全掌握。';
            } else if (score >= total - 3) {
                grade = 'A 級'; icon = '🥇'; msg = '非常優秀！只差一點點就完美了。';
            } else if (score >= total * 0.6) {
                grade = 'B 級'; icon = '🥈'; msg = '表現不錯！請去錯題集中營複習一下喔。';
            }

            if (quizState.mode === 'level' || quizState.mode === 'post_learning') {
                const progressDocId = `${username}_${quizState.level}`;
                const currentBest = allProgress[progressDocId]?.bestScore || 0;
                if (score > currentBest) {
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabProgress', progressDocId), {
                            bestScore: score,
                            updatedAt: new Date().toISOString()
                        }, { merge: true });
                        msg += '<br><span class="text-rose-500 font-bold mt-2 inline-block">🚀 最高紀錄已更新！</span>';
                    } catch(e) {}
                }
            }

            try {
                document.getElementById('quiz-result-icon').innerText = icon;
                document.getElementById('quiz-result-grade').innerText = grade;
                document.getElementById('quiz-result-score').innerText = `答對 ${correct} / ${total} 題`;
                document.getElementById('quiz-result-msg').innerHTML = msg;
            } catch(e) {}

            closeGlobalModal('quiz-modal');
            openGlobalModal('quiz-result-modal');
        };

        // ==========================================
        //  錯題集中營 (Weakness Camp) 與 成績總覽 邏輯
        // ==========================================
        window.openWeaknessCamp = () => {
            try {
                const container = document.getElementById('weakness-content');
                const myWeaknesses = Object.values(allWeakness).filter(w => w.user === username);
                
                if(myWeaknesses.length === 0) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-16 text-gray-500">
                            <div class="text-6xl mb-6 drop-shadow-md">🎉</div>
                            <h3 class="text-2xl font-black text-rose-500 drop-shadow-sm">太棒了！目前沒有錯題！</h3>
                            <p class="text-md mt-2 font-bold text-gray-400">繼續保持這個氣勢，多做測驗吧 🚀</p>
                        </div>
                    `;
                } else {
                    const weakByLevel = {};
                    LEVELS.forEach(l => weakByLevel[l] = []);
                    myWeaknesses.forEach(w => {
                        if (weakByLevel[w.wordObj.level]) weakByLevel[w.wordObj.level].push(w);
                    });

                    let html = '<div class="space-y-8">';
                    LEVELS.forEach(lvl => {
                        const weakWords = weakByLevel[lvl];
                        if (weakWords.length > 0) {
                            html += `
                                <div>
                                    <h3 class="text-xl font-black text-red-600 mb-4 border-b-2 border-red-200 pb-2 pl-2 border-l-4 border-l-red-500">${lvl} <span class="text-sm font-bold text-gray-400 ml-2">共 ${weakWords.length} 題</span></h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            `;
                            
                            weakWords.forEach(weak => {
                                const w = weak.wordObj;
                                const safeWord = escapeQuotes(w.word);
                                const safeSentence = escapeQuotes(w.sentence);

                                html += `
                                    <div class="rounded-2xl p-5 shadow-sm border-2 border-red-200 bg-red-50/50 relative flex flex-col hover:shadow-md transition-shadow group">
                                        <div class="flex items-center gap-3 mt-2 mb-3">
                                            <button onclick="playAudio('${safeWord}', event)" class="w-8 h-8 bg-white text-red-500 rounded-full flex items-center justify-center hover:bg-red-100 transition-colors shadow-sm shrink-0 border border-red-200">
                                                🔊
                                            </button>
                                            <h4 class="font-black text-gray-800 text-xl md:text-2xl leading-tight">${w.word}</h4>
                                        </div>
                                        
                                        <div class="text-red-700 font-bold mb-3">
                                            <span class="text-gray-500 mr-1">${w.pos}</span>${w.meaning}
                                        </div>
                                        
                                        ${w.sentence ? `
                                            <div class="bg-white p-3 rounded-xl border border-red-100 mb-2 text-sm flex gap-2">
                                                <button onclick="playAudio('${safeSentence}', event)" class="w-6 h-6 bg-red-50 text-red-400 rounded-full flex items-center justify-center hover:bg-red-100 transition-colors shrink-0 text-[10px] mt-0.5">🔊</button>
                                                <div>
                                                    <div class="text-gray-700 font-medium mb-1">${w.sentence}</div>
                                                    <div class="text-gray-500 text-xs">${w.translation}</div>
                                                </div>
                                            </div>
                                        ` : ''}
                                    </div>
                                `;
                            });
                            
                            html += `</div></div>`;
                        }
                    });
                    html += '</div>';
                    container.innerHTML = html;
                }
                
                closeGlobalModal('quiz-result-modal'); 
                openGlobalModal('weakness-modal');
            } catch(e) { console.error("openWeaknessCamp error", e); }
        };

        window.openScoreBoard = () => {
            try {
                const header = document.getElementById('score-board-header');
                const tbody = document.getElementById('score-board-body');
                if(!header || !tbody) return;
                
                let headerHtml = `<th class="p-3 bg-indigo-100 sticky left-0 z-10">學習者</th>`;
                LEVELS.forEach(lvl => headerHtml += `<th class="p-3 whitespace-nowrap">${lvl}</th>`);
                header.innerHTML = headerHtml;

                let bodyHtml = '';
                globalUsers.forEach(u => {
                    const dispName = usersProfile[u]?.nickname || u;
                    bodyHtml += `<tr class="hover:bg-indigo-50 transition-colors">`;
                    bodyHtml += `<td class="p-3 font-black text-gray-800 bg-white sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] flex items-center gap-2">
                                    <div class="${getUserColor(u)} w-6 h-6 rounded-full flex items-center justify-center text-[10px] shadow-sm">${getAvatarChar(u)}</div>
                                    ${dispName}
                                 </td>`;
                    
                    LEVELS.forEach(lvl => {
                        const score = allProgress[`${u}_${lvl}`]?.bestScore;
                        if (score !== undefined) {
                            let colorClass = 'text-gray-600 font-bold';
                            if (score >= 20) colorClass = 'text-rose-600 font-black';
                            else if (score >= 16) colorClass = 'text-green-600 font-black';
                            bodyHtml += `<td class="p-3 ${colorClass}">${score} / 20</td>`;
                        } else {
                            bodyHtml += `<td class="p-3 text-gray-300">-</td>`;
                        }
                    });
                    bodyHtml += `</tr>`;
                });
                tbody.innerHTML = bodyHtml;

                openGlobalModal('score-board-modal');
            } catch(e) { console.error("openScoreBoard error", e); }
        };

        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if (username && !globalUsers.includes(username)) {
                    alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！');
                    window.logout(); 
                }
            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(username) {
                    try { window.renderMainContent(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2027-05-22', title: '多益測驗日' },
                        { date: '2026-10-13', title: '階段性測驗' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) {
                    try { window.renderSidebar(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) {
                    try { window.renderChat(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            // 題庫資料監聽
            const vocabCol = collection(db, 'artifacts', appId, 'public', 'data', 'Vocab');
            if(unsubVocab) unsubVocab();
            unsubVocab = onSnapshot(vocabCol, (snap) => {
                allVocab = {};
                snap.forEach(docSnap => allVocab[docSnap.id] = docSnap.data());
                if(username) {
                    try {
                        const progressModal = document.getElementById('progress-modal');
                        if(progressModal && !progressModal.classList.contains('hidden')) window.openProgressModal();
                        window.renderMainContent(); // Ensure calendar re-renders if needed
                    } catch(e) {}
                }
            }, errHandler);

            // 學習進度監聽
            const progressCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabProgress');
            if(unsubProgress) unsubProgress();
            unsubProgress = onSnapshot(progressCol, (snap) => {
                allProgress = {};
                snap.forEach(docSnap => allProgress[docSnap.id] = docSnap.data());
                if(username && document.getElementById('progress-modal') && !document.getElementById('progress-modal').classList.contains('hidden')) {
                    try { window.openProgressModal(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            // 活動紀錄監聽 (日曆顯示用)
            const activityCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabActivity');
            if(unsubActivity) unsubActivity();
            unsubActivity = onSnapshot(activityCol, (snap) => {
                allActivities = {};
                snap.forEach(docSnap => allActivities[docSnap.id] = docSnap.data());
                if(username) {
                    try { window.renderMainContent(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            // 最愛單字監聽
            const favCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabFavorites');
            if(unsubFav) unsubFav();
            unsubFav = onSnapshot(favCol, (snap) => {
                allFavorites = {};
                snap.forEach(docSnap => allFavorites[docSnap.id] = docSnap.data());
                if(username) {
                    try {
                        window.renderFavorites();
                        const learningModal = document.getElementById('learning-modal');
                        if(learningModal && !learningModal.classList.contains('hidden')) window.renderLearningPage();
                        const waterfallModal = document.getElementById('waterfall-modal');
                        if(waterfallModal && !waterfallModal.classList.contains('hidden')) {
                             const titleText = document.getElementById('waterfall-title').innerText;
                             const lvlMatch = titleText.match(/Level \d+/);
                             if (lvlMatch) window.openWaterfall(lvlMatch[0]);
                        }
                    } catch(e) { console.error(e); }
                }
            }, errHandler);

            // 錯題集中營監聽
            const weakCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabWeakness');
            if(unsubWeak) unsubWeak();
            unsubWeak = onSnapshot(weakCol, (snap) => {
                allWeakness = {};
                snap.forEach(docSnap => allWeakness[docSnap.id] = docSnap.data());
                if(username && document.getElementById('weakness-modal') && !document.getElementById('weakness-modal').classList.contains('hidden')) {
                    try { window.openWeaknessCamp(); } catch(e) { console.error(e); }
                }
            }, errHandler);
        };

        const initApp = async () => {
            try {
                window.renderApp();
            } catch (e) { console.error("renderApp error", e); }
            
            // 初始化發音語音
            try {
                initVoice();
            } catch (e) { console.error("initVoice error", e); }

            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            doCompleteLogin(savedUser); 
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        // 確保 DOM 渲染完畢後再執行初始化
        setTimeout(initApp, 100);

    </script>
</body>
</html>
