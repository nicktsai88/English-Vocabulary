<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ 英文題庫管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Varela Round', 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200 flex flex-col h-[90vh]">
        
        <!-- Header -->
        <div class="bg-gray-800 p-5 text-white flex justify-between items-center shrink-0">
            <h1 class="text-2xl font-black flex items-center gap-2">⚙️ 英文題庫管理系統</h1>
            <div id="status-badge" class="bg-red-500 text-white px-3 py-1 rounded-full text-sm font-bold shadow-inner">未連線</div>
        </div>

        <div class="flex-1 flex overflow-hidden">
            <!-- Left Panel: Form -->
            <div class="w-1/3 bg-gray-50 border-r border-gray-200 p-6 overflow-y-auto custom-scrollbar flex flex-col gap-6">
                
                <!-- Single Word Insert -->
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h2 class="font-bold text-lg text-gray-700 mb-4 border-l-4 border-indigo-500 pl-2">新增單筆單字</h2>
                    <div class="space-y-3 text-sm">
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">等級 Level *</label>
                            <select id="f-level" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400 font-bold text-indigo-700">
                                <option value="Level 1">Level 1</option>
                                <option value="Level 2">Level 2</option>
                                <option value="Level 3">Level 3</option>
                                <option value="Level 4">Level 4</option>
                                <option value="Level 5">Level 5</option>
                                <option value="Level 6">Level 6</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">英文單字 *</label>
                            <input type="text" id="f-word" placeholder="例如: apple" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400 font-black text-gray-800">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">詞性 *</label>
                            <input type="text" id="f-pos" placeholder="例如: n." class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">中文意思 *</label>
                            <input type="text" id="f-meaning" placeholder="例如: 蘋果" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">英文例句</label>
                            <input type="text" id="f-sentence" placeholder="I eat an apple." class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">中文翻譯</label>
                            <input type="text" id="f-translation" placeholder="我吃一顆蘋果。" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400">
                        </div>
                        <button onclick="addSingleWord()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition-colors mt-2 shadow-sm">
                            💾 新增單字
                        </button>
                    </div>
                </div>

                <!-- Bulk Import -->
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h2 class="font-bold text-lg text-gray-700 mb-4 border-l-4 border-amber-500 pl-2">批次匯入 (JSON)</h2>
                    <div class="space-y-3 text-sm">
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">目標等級 *</label>
                            <select id="b-level" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-amber-400 font-bold text-amber-700">
                                <option value="Level 1">Level 1</option>
                                <option value="Level 2">Level 2</option>
                                <option value="Level 3">Level 3</option>
                                <option value="Level 4">Level 4</option>
                                <option value="Level 5">Level 5</option>
                                <option value="Level 6">Level 6</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">JSON 陣列</label>
                            <textarea id="b-json" rows="5" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-amber-400 text-xs font-mono" placeholder='[{"word":"banana","pos":"n.","meaning":"香蕉","sentence":"...","translation":"..."}]'></textarea>
                        </div>
                        <button onclick="bulkImport()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-lg transition-colors mt-2 shadow-sm">
                            🚀 批次匯入
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Data Table -->
            <div class="w-2/3 p-6 flex flex-col bg-white">
                <div class="flex justify-between items-center mb-4 shrink-0">
                    <h2 class="font-black text-xl text-gray-800">📋 題庫列表清單</h2>
                    <select id="filter-level" onchange="renderTable()" class="px-4 py-2 rounded-xl border border-gray-300 font-bold text-indigo-700 bg-indigo-50 outline-none">
                        <option value="ALL">顯示全部 (ALL)</option>
                        <option value="Level 1">Level 1</option>
                        <option value="Level 2">Level 2</option>
                        <option value="Level 3">Level 3</option>
                        <option value="Level 4">Level 4</option>
                        <option value="Level 5">Level 5</option>
                        <option value="Level 6">Level 6</option>
                    </select>
                </div>
                
                <div class="flex-1 overflow-auto border border-gray-200 rounded-xl">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-gray-100 text-gray-600 font-bold sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="p-3">等級 / 序號</th>
                                <th class="p-3">單字</th>
                                <th class="p-3">詞性 / 中文</th>
                                <th class="p-3 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="vocab-table-body" class="divide-y divide-gray-100">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
                <div class="text-sm font-bold text-gray-400 text-right mt-3 shrink-0" id="total-count">總計: 0 筆</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        //  系統設定與常數 (需與主系統相同)
        // ==========================================
        const BASE_FIREBASE_CONFIG = {
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'study-group-app';
        
        let db, auth;
        let allVocab = [];

        const getStoredConfig = () => {
            const stored = localStorage.getItem('study_group_firebase_config');
            if (stored) { try { return JSON.parse(stored); } catch(e) {} }
            if (typeof __firebase_config !== 'undefined') { try { return JSON.parse(__firebase_config); } catch(e) {} }
            return null;
        };

        const updateStatus = (msg, isConnected) => {
            const badge = document.getElementById('status-badge');
            badge.innerText = msg;
            badge.className = `px-3 py-1 rounded-full text-sm font-bold shadow-inner text-white ${isConnected ? 'bg-green-500' : 'bg-red-500'}`;
        };

        window.renderTable = () => {
            const tbody = document.getElementById('vocab-table-body');
            const filterLvl = document.getElementById('filter-level').value;
            
            let filtered = filterLvl === 'ALL' ? allVocab : allVocab.filter(v => v.level === filterLvl);
            
            // Sort by level then index
            filtered.sort((a,b) => {
                if(a.level !== b.level) return a.level.localeCompare(b.level);
                return (a.index || 0) - (b.index || 0);
            });

            document.getElementById('total-count').innerText = `總計: ${filtered.length} 筆`;

            tbody.innerHTML = filtered.map(v => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-3 text-gray-500 font-mono"><span class="bg-gray-100 px-2 py-0.5 rounded text-xs">${v.level}</span> #${v.index}</td>
                    <td class="p-3 font-black text-gray-800 text-base">${v.word}</td>
                    <td class="p-3 text-gray-600"><span class="font-bold text-gray-400 mr-1">${v.pos}</span>${v.meaning}</td>
                    <td class="p-3 text-right">
                        <button onclick="deleteWord('${v.id}')" class="bg-red-50 text-red-500 hover:bg-red-100 px-3 py-1.5 rounded-lg font-bold text-xs transition-colors">刪除</button>
                    </td>
                </tr>
            `).join('');
        };

        window.addSingleWord = async () => {
            const level = document.getElementById('f-level').value;
            const word = document.getElementById('f-word').value.trim();
            const pos = document.getElementById('f-pos').value.trim();
            const meaning = document.getElementById('f-meaning').value.trim();
            const sentence = document.getElementById('f-sentence').value.trim();
            const translation = document.getElementById('f-translation').value.trim();

            if(!word || !meaning || !pos) return alert("單字、詞性、中文意思為必填！");

            const levelWords = allVocab.filter(v => v.level === level);
            const maxIndex = levelWords.length > 0 ? Math.max(...levelWords.map(v => v.index || 0)) : 0;
            
            const docId = crypto.randomUUID();
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Vocab', docId), {
                    id: docId,
                    level, word, pos, meaning, sentence, translation,
                    index: maxIndex + 1,
                    createdAt: new Date().toISOString()
                });
                
                document.getElementById('f-word').value = '';
                document.getElementById('f-pos').value = '';
                document.getElementById('f-meaning').value = '';
                document.getElementById('f-sentence').value = '';
                document.getElementById('f-translation').value = '';
                alert(`已成功新增單字：${word} (${level} #${maxIndex + 1})`);
            } catch(e) {
                console.error(e);
                alert("新增失敗！");
            }
        };

        window.bulkImport = async () => {
            const level = document.getElementById('b-level').value;
            const text = document.getElementById('b-json').value.trim();
            if(!text) return alert("請輸入 JSON 資料");
            
            try {
                const data = JSON.parse(text);
                if(!Array.isArray(data)) return alert("請提供 JSON 陣列格式！\n範例：[{\"word\":\"apple\"...}]");
                
                const levelWords = allVocab.filter(v => v.level === level);
                let currentIndex = levelWords.length > 0 ? Math.max(...levelWords.map(v => v.index || 0)) : 0;
                
                let count = 0;
                for(let item of data) {
                    const docId = crypto.randomUUID();
                    currentIndex++;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Vocab', docId), {
                        id: docId,
                        level: level,
                        word: item.word || item.英文 || '',
                        pos: item.pos || item.詞性 || '',
                        meaning: item.meaning || item.中文 || '',
                        sentence: item.sentence || item.例句 || '',
                        translation: item.translation || item.翻譯 || '',
                        index: currentIndex,
                        createdAt: new Date().toISOString()
                    });
                    count++;
                }
                alert(`成功批次匯入 ${count} 筆單字至 ${level}！`);
                document.getElementById('b-json').value = '';
            } catch(e) {
                console.error(e);
                alert("JSON 解析失敗，請確認格式是否正確。");
            }
        };

        window.deleteWord = async (docId) => {
            if(!confirm("確定要刪除這筆單字嗎？")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Vocab', docId));
            } catch(e) {
                console.error(e);
                alert("刪除失敗！");
            }
        };

        const initSystem = async () => {
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                alert("請先返回主系統填寫 API Key 設定！");
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                const appInstance = initializeApp(fullConfig);
                auth = getAuth(appInstance);
                db = getFirestore(appInstance);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        updateStatus("連線成功，即時同步中", true);
                        const vocabCol = collection(db, 'artifacts', appId, 'public', 'data', 'Vocab');
                        onSnapshot(vocabCol, (snap) => {
                            let temp = [];
                            snap.forEach(d => temp.push(d.data()));
                            allVocab = temp;
                            window.renderTable();
                        }, (err) => {
                            console.error(err);
                            updateStatus("監聽失敗", false);
                        });
                    } else {
                        updateStatus("未連線 (驗證失敗)", false);
                    }
                });

            } catch (error) {
                console.error(error);
                updateStatus("初始化失敗", false);
            }
        };

        initSystem();
    </script>
</body>
</html>
