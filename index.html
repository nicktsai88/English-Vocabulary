    <style>
        html, body {
            height: 100%; 
            height: -webkit-fill-available;
            height: 100dvh;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Varela Round', 'Noto Sans TC', sans-serif;
            background-color: #fff0f5; /* 淺櫻花粉背景 */
            background-image: 
                radial-gradient(#fbcfe8 2px, transparent 2px),
                radial-gradient(#fce7f3 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #4c1d95; /* 深紫灰色，增加對比 */
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 3px solid #fbcfe8;
            box-shadow: 0 8px 32px rgba(244, 114, 182, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(244, 114, 182, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(244, 114, 182, 0.8); }

        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }

        /* 答錯時的震動動畫 */
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; transform: translate3d(0, 0, 0); }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        @keyframes marqueeVertical {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .marquee-container {
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            animation: marqueeVertical 15s linear infinite;
        }
        .marquee-container:hover .marquee-content, 
        .marquee-container:active .marquee-content {
            animation-play-state: paused;
        }
        
        .chat-bubble-me { background: #fdf2f8; border-radius: 1rem 1rem 0 1rem; border: 1px solid #fbcfe8; }
        .chat-bubble-other { background: #ffffff; border-radius: 1rem 1rem 1rem 0; border: 1px solid #fce7f3; }
    </style>

    <script type="application/json" id="app-data">
    {

            const now = new Date();
            now.setHours(0,0,0,0);

            target.setHours(0,0,0,0);
            return Math.ceil((target - now) / (1000 * 60 * 60 * 24));

            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

            const nums = ['➀','➁','➂','➃','➄','➅','➆','➇','➈','➉','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
            return nums[idx] || `(${idx+1})`;
        };

            if(!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');

            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const inner = modal.firstElementChild;
                if(inner.classList.contains('scale-95')) inner.classList.remove('scale-95');
            }, 10);
        };

        window.closeGlobalModal = (id) => {
            const modal = document.getElementById(id);
            if(!modal) return;
            modal.classList.add('opacity-0');
            const inner = modal.firstElementChild;
            if(inner && inner.classList.contains('scale-95') === false) inner.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        window.openProgressModal = () => {
            const targetUser = viewingUser === 'ALL' ? username : viewingUser;
            if (!targetUser) return;
            const dispName = usersProfile[targetUser]?.nickname || targetUser;
            document.getElementById('progress-user-name').innerText = `📈 ${dispName} 的單字進度`;

            let html = '<div class="space-y-4">';

                const levelWords = Object.values(allVocab).filter(v => v.level === lvl);
                const totalWords = levelWords.length;
                const progressDocId = `${targetUser}_${lvl}`;
                const learnedWords = allProgress[progressDocId]?.lastIndex || 0;
                const bestScore = allProgress[progressDocId]?.bestScore || '-';
                const percent = totalWords > 0 ? Math.min(100, Math.round((learnedWords / totalWords) * 100)) : 0;
                
                let scoreBadge = '';
                if(bestScore !== '-') {
                    let color = 'bg-gray-100 text-gray-600';
                    if(bestScore >= 15) color = 'bg-yellow-100 text-yellow-700 border border-yellow-300';
                    else if(bestScore >= 13) color = 'bg-green-100 text-green-700 border border-green-300';
                    else if(bestScore >= 10) color = 'bg-blue-100 text-blue-700 border border-blue-300';
                    scoreBadge = `<span class="ml-2 px-2 py-0.5 rounded text-xs font-black ${color} shadow-sm" title="此等級測驗最高分">👑 最高 ${bestScore}/15</span>`;
                }

                html += `
                    <div class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-pink-100 hover:shadow-md transition-shadow relative">
                        <button onclick="openWaterfall('${lvl}')" class="absolute top-4 right-4 bg-pink-50 text-pink-600 hover:bg-pink-100 border border-pink-200 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1 transition-colors shadow-sm">

                        <div class="flex items-center mb-3">
                            <h4 class="font-black text-xl text-rose-600">${lvl}</h4>
                            ${scoreBadge}
                        </div>
                        
                        <div class="flex justify-between items-end mb-1 pr-32">
                            <span class="text-sm font-bold text-gray-500">${learnedWords} / ${totalWords} 字 (${percent}%)</span>
                        </div>
                        <div class="w-full bg-pink-50 rounded-full h-4 overflow-hidden border border-pink-100">
                            <div class="bg-gradient-to-r from-pink-400 to-rose-400 h-4 rounded-full transition-all duration-500" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            document.getElementById('progress-content').innerHTML = html;
            openGlobalModal('progress-modal');
        };

        window.openWaterfall = (level) => {
            const levelWords = Object.values(allVocab).filter(v => v.level === level).sort((a,b) => a.index - b.index);
            document.getElementById('waterfall-title').innerText = `👁️ ${level} 單字總覽 (${levelWords.length} 字)`;
            
            if(levelWords.length === 0) {
                document.getElementById('waterfall-content').innerHTML = `<div class="text-center text-gray-400 font-bold mt-10">此等級尚無單字資料</div>`;
                openGlobalModal('waterfall-modal');
                return;
            }

            let html = '<div class="columns-1 md:columns-2 lg:columns-3 gap-4 space-y-4">';
            levelWords.forEach(w => {
                const favId = `${username}_${w.id}`;
                const isFav = !!allFavorites[favId];
                const safeWord = escapeQuotes(w.word);
                
                html += `
                    <div class="bg-white p-4 rounded-xl border border-pink-100 shadow-sm break-inside-avoid hover:shadow-md transition-shadow group relative">
                        <button onclick="toggleFavorite('${w.id}', event)" class="absolute top-3 right-3 text-lg hover:scale-125 transition-transform" title="收藏">
                            ${isFav ? '❤️' : '🤍'}
                        </button>
                        <div class="flex items-center gap-2 mb-2 pr-8">

                            <h4 class="font-black text-lg text-gray-800 break-words">${w.word}</h4>
                        </div>
                        <div class="text-sm font-bold text-rose-500 mb-2"><span class="text-gray-400 mr-1">${w.pos}</span>${w.meaning}</div>
                        ${w.sentence ? `

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const progressDocId = `${username}_${level}`;

            const levelWords = Object.values(allVocab).filter(v => v.level === level).sort((a,b) => a.index - b.index);

                return;
            }

            let reviewBatch = [];
            // 邏輯：抽取 40% 最新, 30% 最久, 30% 中間 (總數 30)
            const targetCount = 30;
            if (learnedWords.length <= targetCount) {
                reviewBatch = [...learnedWords];
            } else {
                const numNew = Math.floor(targetCount * 0.4); // 12
                const numOld = Math.floor(targetCount * 0.3); // 9
                const numMid = targetCount - numNew - numOld; // 9

                const newest = learnedWords.slice(-numNew);
                const oldest = learnedWords.slice(0, numOld);
                const middlePool = learnedWords.slice(numOld, learnedWords.length - numNew);
                
                // 隨機抽中間
                const middleSelected = middlePool.sort(() => 0.5 - Math.random()).slice(0, numMid);
                
                reviewBatch = [...newest, ...oldest, ...middleSelected].sort((a,b) => a.index - b.index);

        window.startQuiz = (mode, level) => {
            let pool = [];
            if (mode === 'recent') {
                // 從剛學完的 batch 裡挑
                pool = [...currentLearningBatch];
            } else {
                // 從該 Level 已學過的挑
                const progressDocId = `${username}_${level}`;
                const learnedCount = allProgress[progressDocId]?.lastIndex || 0;
                const levelWords = Object.values(allVocab).filter(v => v.level === level).sort((a,b) => a.index - b.index);
                pool = levelWords.slice(0, learnedCount);
            }

            // 過濾出有例句的單字作為優先題庫 (如果沒有例句，則退化為考中文意思)
            if (pool.length < 4) {
                alert("已學習的單字數量不足，無法進行測驗！（至少需要 4 個單字）");
                return;
            }

            // 隨機抽 15 題 (若不足則全上)
            const shuffledPool = pool.sort(() => 0.5 - Math.random());
            const selectedQuestions = shuffledPool.slice(0, 15);

            quizState = {
                level: level,
                mode: mode,
                questions: selectedQuestions,
                currentIndex: 0,
                correct: 0,

            };

            closeGlobalModal('complete-modal');

        window.renderQuizQuestion = () => {

            const current = quizState.currentIndex;
            
            // Update Progress bar
            const pct = (current / total) * 100;
            document.getElementById('quiz-progress-bar').style.width = `${pct}%`;
            document.getElementById('quiz-progress-badge').innerText = `第 ${current + 1} / ${total} 題`;

            const wordObj = quizState.questions[current];
            const correctWordStr = wordObj.word;
            const safeCorrectWord = escapeQuotes(correctWordStr);

            // Generate 3 wrong options from ALL vocab
            let allOthers = Object.values(allVocab).filter(v => v.word !== correctWordStr);
            allOthers = allOthers.sort(() => 0.5 - Math.random()).slice(0, 3);
            
            const options = [wordObj, ...allOthers].sort(() => 0.5 - Math.random());

            // Prepare Question Text (Cloze test on sentence, or meaning if no sentence)
            let questionHtml = '';
            if (wordObj.sentence) {
                // 將例句中的目標單字挖空 (用正則表達式，忽略大小寫)
                const regex = new RegExp(`\\b${correctWordStr}\\b`, 'gi');
                const blankedSentence = wordObj.sentence.replace(regex, '__________');
                
                questionHtml = `
                    <div class="text-sm font-bold text-rose-500 mb-2">請選出適合填入空格的單字：</div>
                    <div class="text-xl md:text-3xl font-black text-gray-800 leading-relaxed mb-4 px-4">${blankedSentence}</div>
                    <div class="text-gray-500 font-bold bg-white inline-block px-4 py-1.5 rounded-full border border-rose-100 shadow-sm">💡 提示：${wordObj.meaning}</div>
                `;
            } else {
                questionHtml = `
                    <div class="text-sm font-bold text-rose-500 mb-2">請選出符合以下意思的單字：</div>
                    <div class="text-3xl font-black text-gray-800 leading-relaxed mb-4 px-4">${wordObj.meaning}</div>
                `;
            }

            const optionsHtml = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8 w-full max-w-xl mx-auto">
                    ${options.map(opt => `
                        <button onclick="checkQuizAnswer(this, '${escapeQuotes(opt.word)}', '${safeCorrectWord}')" data-word="${escapeQuotes(opt.word)}" class="quiz-option-btn py-4 px-6 rounded-2xl bg-white border-2 border-rose-200 text-gray-700 font-black text-lg md:text-xl shadow-sm hover:bg-rose-50 hover:border-rose-400 hover:scale-[1.02] transition-all">
                            ${opt.word}
                        </button>
                    `).join('')}
                </div>
            `;

            document.getElementById('quiz-question-container').innerHTML = questionHtml + optionsHtml;
        };

        window.checkQuizAnswer = async (btn, selectedWord, correctWord) => {
            // Disable all buttons to prevent double click
            const btns = document.querySelectorAll('.quiz-option-btn');
            btns.forEach(b => b.disabled = true);

            const isCorrect = (selectedWord === correctWord);

            if (isCorrect) {
                btn.classList.replace('bg-white', 'bg-green-400');
                btn.classList.replace('border-rose-200', 'border-green-500');
                btn.classList.replace('text-gray-700', 'text-white');
                btn.classList.remove('hover:bg-rose-50', 'hover:border-rose-400');
                
                playAudio(correctWord, null);
                quizState.correct++;
                setTimeout(nextQuizQuestion, 1000);
            } else {
                // Wrong animation
                btn.classList.replace('bg-white', 'bg-red-500');
                btn.classList.replace('border-rose-200', 'border-red-600');
                btn.classList.replace('text-gray-700', 'text-white');
                btn.classList.remove('hover:bg-rose-50', 'hover:border-rose-400');
                btn.classList.add('shake');
                
                // Highlight correct answer
                const correctBtn = Array.from(btns).find(b => b.dataset.word === correctWord);
                if (correctBtn) {
                    correctBtn.classList.replace('bg-white', 'bg-green-400');
                    correctBtn.classList.replace('border-rose-200', 'border-green-500');
                    correctBtn.classList.replace('text-gray-700', 'text-white');
                }

                // Play correct word audio
                playAudio(correctWord, null);

                // Add to wrong words list (avoid duplicates)
                const currentObj = quizState.questions[quizState.currentIndex];
                if (!quizState.wrongWords.find(w => w.id === currentObj.id)) {
                    quizState.wrongWords.push(currentObj);
                }

                setTimeout(nextQuizQuestion, 1800);
            }
        };

        window.nextQuizQuestion = () => {
            quizState.currentIndex++;
            if (quizState.currentIndex >= quizState.questions.length) {
                finishQuiz();
            } else {
                renderQuizQuestion();
            }
        };

        window.finishQuiz = async () => {
            const total = quizState.questions.length;
            const correct = quizState.correct;
            const score = correct; 

            // Save to Weakness Camp
            if (quizState.wrongWords.length > 0) {
                try {
                    for(let w of quizState.wrongWords) {
                        const weakId = `${username}_${w.id}`;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabWeakness', weakId), {
                            user: username,
                            wordId: w.id,
                            wordObj: w,
                            addedAt: new Date().toISOString()
                        }, { merge: true });
                    }
                } catch(e) { console.error("Error saving weaknesses", e); }
            }

            // Calculate Grade
            let grade = 'C 級';
            let icon = '🎯';
            let msg = '再接再厲！錯題已經幫您整理到集中營囉。';
            
            if (score === total) {
                grade = 'S 級'; icon = '👑'; msg = '太神啦！完美無瑕！完全掌握。';
            } else if (score >= total - 2) {
                grade = 'A 級'; icon = '🥇'; msg = '非常優秀！只差一點點就完美了。';
            } else if (score >= total * 0.6) {
                grade = 'B 級'; icon = '🥈'; msg = '表現不錯！請去錯題集中營複習一下喔。';
            }

            // If it's a Level Quiz (not just recent batch), update the best score
            if (quizState.mode === 'level') {
                const progressDocId = `${username}_${quizState.level}`;
                const currentBest = allProgress[progressDocId]?.bestScore || 0;
                if (score > currentBest) {
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabProgress', progressDocId), {
                            bestScore: score,
                            updatedAt: new Date().toISOString()
                        }, { merge: true });
                        msg += '<br><span class="text-rose-500 font-bold mt-2 inline-block">🚀 最高紀錄已更新！</span>';
                    } catch(e) {}
                }
            }

            document.getElementById('quiz-result-icon').innerText = icon;
            document.getElementById('quiz-result-grade').innerText = grade;
            document.getElementById('quiz-result-score').innerText = `答對 ${correct} / ${total} 題`;
            document.getElementById('quiz-result-msg').innerHTML = msg;

            closeGlobalModal('quiz-modal');
            openGlobalModal('quiz-result-modal');
        };

        // ==========================================
        //  錯題集中營 (Weakness Camp) 邏輯
        // ==========================================
        window.openWeaknessCamp = () => {
            const container = document.getElementById('weakness-content');
            const myWeaknesses = Object.values(allWeakness).filter(w => w.user === username);
            
            if(myWeaknesses.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-gray-500">
                        <div class="text-6xl mb-6 drop-shadow-md">🎉</div>
                        <h3 class="text-2xl font-black text-rose-500 drop-shadow-sm">太棒了！目前沒有未記熟的錯題！</h3>
                        <p class="text-md mt-2 font-bold text-gray-400">繼續保持這個氣勢，多做測驗吧 🚀</p>
                    </div>
                `;
            } else {
                let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
                myWeaknesses.forEach(weak => {
                    const w = weak.wordObj;
                    const safeWord = escapeQuotes(w.word);
                    const safeSentence = escapeQuotes(w.sentence);

                    html += `
                        <div class="rounded-2xl p-5 shadow-sm border-2 border-red-200 bg-red-50/50 relative flex flex-col hover:shadow-md transition-shadow group">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-bold text-xs text-red-600 bg-white px-2 py-1 rounded border border-red-100 shadow-sm">
                                    📌 ${w.level}
                                </span>
                            </div>
                            
                            <div class="flex items-center gap-3 mt-2 mb-3">
                                <button onclick="playAudio('${safeWord}', event)" class="w-8 h-8 bg-white text-red-500 rounded-full flex items-center justify-center hover:bg-red-100 transition-colors shadow-sm shrink-0 border border-red-200">
                                    🔊
                                </button>
                                <h4 class="font-black text-gray-800 text-xl md:text-2xl leading-tight">${w.word}</h4>
                            </div>
                            
                            <div class="text-red-700 font-bold mb-3">
                                <span class="text-gray-500 mr-1">${w.pos}</span>${w.meaning}
                            </div>
                            
                            ${w.sentence ? `
                                <div class="bg-white p-3 rounded-xl border border-red-100 mb-4 text-sm flex gap-2">
                                    <button onclick="playAudio('${safeSentence}', event)" class="w-6 h-6 bg-red-50 text-red-400 rounded-full flex items-center justify-center hover:bg-red-100 transition-colors shrink-0 text-[10px] mt-0.5">🔊</button>
                                    <div>
                                        <div class="text-gray-700 font-medium mb-1">${w.sentence}</div>
                                        <div class="text-gray-500 text-xs">${w.translation}</div>
                                    </div>
                                </div>
                            ` : ''}
                            
                            <button onclick="resolveWeakness('${weak.wordId}')" class="mt-auto w-full py-2.5 bg-white border-2 border-green-400 text-green-600 font-bold rounded-xl hover:bg-green-50 hover:scale-[1.02] transition-all flex items-center justify-center gap-1 shadow-sm">
                                ✅ 我已經記熟了
                            </button>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            }
            
            closeGlobalModal('quiz-result-modal'); // 確保是從測驗結果跳過來時能關閉
            openGlobalModal('weakness-modal');
        };

        window.resolveWeakness = async (wordId) => {
            const weakId = `${username}_${wordId}`;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabWeakness', weakId));
            } catch(e) {
                console.error(e);
            }
        };

        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if (username && !globalUsers.includes(username)) {
                    alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！');
                    window.logout(); 
                }
            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(username) window.renderMainContent();
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2027-05-22', title: '多益測驗日' },
                        { date: '2026-10-13', title: '階段性測驗' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) window.renderSidebar();
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) window.renderChat();
            }, errHandler);

            // 題庫資料監聽
            const vocabCol = collection(db, 'artifacts', appId, 'public', 'data', 'Vocab');
            if(unsubVocab) unsubVocab();
            unsubVocab = onSnapshot(vocabCol, (snap) => {
                allVocab = {};
                snap.forEach(docSnap => allVocab[docSnap.id] = docSnap.data());
                if(username && document.getElementById('progress-modal') && !document.getElementById('progress-modal').classList.contains('hidden')) window.openProgressModal();
            }, errHandler);

            // 學習進度監聽
            const progressCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabProgress');
            if(unsubProgress) unsubProgress();
            unsubProgress = onSnapshot(progressCol, (snap) => {
                allProgress = {};
                snap.forEach(docSnap => allProgress[docSnap.id] = docSnap.data());
                if(username && document.getElementById('progress-modal') && !document.getElementById('progress-modal').classList.contains('hidden')) window.openProgressModal();
            }, errHandler);

            // 活動紀錄監聽 (日曆顯示用)
            const activityCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabActivity');
            if(unsubActivity) unsubActivity();
            unsubActivity = onSnapshot(activityCol, (snap) => {
                allActivities = {};
                snap.forEach(docSnap => allActivities[docSnap.id] = docSnap.data());
                if(username) window.renderMainContent();
            }, errHandler);

            // 最愛單字監聽
            const favCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabFavorites');
            if(unsubFav) unsubFav();
            unsubFav = onSnapshot(favCol, (snap) => {
                allFavorites = {};
                snap.forEach(docSnap => allFavorites[docSnap.id] = docSnap.data());
                if(username) {
                    window.renderFavorites();
                    const learningModal = document.getElementById('learning-modal');
                    if(learningModal && !learningModal.classList.contains('hidden')) window.renderLearningPage();
                    const waterfallModal = document.getElementById('waterfall-modal');
                    if(waterfallModal && !waterfallModal.classList.contains('hidden')) {
                         const titleText = document.getElementById('waterfall-title').innerText;
                         const lvlMatch = titleText.match(/Level \d+/);
                         if (lvlMatch) window.openWaterfall(lvlMatch[0]);
                    }
                }
            }, errHandler);

            // 錯題集中營監聽
            const weakCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabWeakness');
            if(unsubWeak) unsubWeak();
            unsubWeak = onSnapshot(weakCol, (snap) => {
                allWeakness = {};
                snap.forEach(docSnap => allWeakness[docSnap.id] = docSnap.data());
                if(username && document.getElementById('weakness-modal') && !document.getElementById('weakness-modal').classList.contains('hidden')) window.openWeaknessCamp();
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            
            // 初始化發音語音
            initVoice();

            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            doCompleteLogin(savedUser); 
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        initApp();

    </script>
</body>
</html>
