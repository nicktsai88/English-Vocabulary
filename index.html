<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎒 邁向5A10+ 國中會考讀書會 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%; 
            height: -webkit-fill-available;
            height: 100dvh;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Varela Round', 'Noto Sans TC', sans-serif;
            background-color: #fdfbfb;
            background-image: 
                radial-gradient(#ffcdd2 2px, transparent 2px),
                radial-gradient(#b2ebf2 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #4a4a4a;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 3px solid #ffe4e6;
            box-shadow: 0 8px 32px rgba(255, 192, 203, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(253, 164, 175, 0.6); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(253, 164, 175, 1); }

        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }

        @keyframes marqueeVertical {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .marquee-container {
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            animation: marqueeVertical 15s linear infinite;
        }
        .marquee-container:hover .marquee-content, 
        .marquee-container:active .marquee-content {
            animation-play-state: paused;
        }
        
        .chat-bubble-me { background: #e0f2fe; border-radius: 1rem 1rem 0 1rem; }
        .chat-bubble-other { background: #fce7f3; border-radius: 1rem 1rem 1rem 0; }
        
        .text-white .step3-color-unit,
        .text-white .step3-color-book,
        .text-white .step3-color-desc {
            color: #ffffff !important;
        }
        .step3-color-unit { color: #DC143C; }
        .step3-color-book { color: #0066FF; }
        .step3-color-desc { color: #696969; }
        
        .step3-color-exam {
            color: #FF0000 !important;
            text-shadow: 0 0 5px #FFFF00, 0 0 10px #FFFF00, 0 0 15px #FFFF00 !important;
        }
    </style>

    <script type="application/json" id="app-data">
    {
      "EXAM_DATE": "2027-05-22T00:00:00",
      "LEVELS": ["Level 1", "Level 2", "Level 3", "Level 4", "Level 5", "Level 6"]
    }
    </script>
</head>
<body class="w-full flex flex-col overflow-hidden">

    <div id="app" class="w-full h-full flex flex-col overflow-hidden"></div>
    <div id="modals-container"></div> 

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        //  系統設定與常數
        // ==========================================
        const BASE_FIREBASE_CONFIG = {
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'study-group-app';
        
        const appDataRaw = document.getElementById('app-data').textContent;
        const appData = JSON.parse(appDataRaw);
        
        const EXAM_DATE = new Date(appData.EXAM_DATE);
        const LEVELS = appData.LEVELS;

        const USER_COLORS = [
            'bg-[#FF0000] text-white', 'bg-[#FF0088] text-white', 'bg-[#FF5511] text-white',
            'bg-[#FF8800] text-white', 'bg-[#FFFF00] text-gray-800', 'bg-[#BBFF00] text-gray-800',
            'bg-[#00FF00] text-gray-800', 'bg-[#00FFFF] text-gray-800', 'bg-[#00BBFF] text-white',
            'bg-[#0000FF] text-white', 'bg-[#7700FF] text-white', 'bg-[#FF00FF] text-white',
            'bg-[#CC00FF] text-white', 'bg-[#009FCC] text-white', 'bg-[#FF88C2] text-gray-800',
            'bg-[#990099] text-white', 'bg-[#007799] text-white', 'bg-[#E38EFF] text-gray-800',
            'bg-[#FFB7DD] text-gray-800', 'bg-[#99FFFF] text-gray-800'
        ];
        
        const getUserColor = (name) => {
            if(!name) return USER_COLORS[0];
            if(usersProfile[name] && usersProfile[name].color) return usersProfile[name].color;
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
        };

        // 資料狀態
        let appInstance, auth, db;
        let currentUser = null;
        let username = '';
        let viewingUser = 'ALL'; 
        let isAdmin = false;
        
        let globalUsers = [];
        let importantDates = [];
        let chatMessages = [];
        let usersProfile = {}; 
        
        // 英文單字相關資料庫快取
        let allVocab = {}; 
        let allProgress = {}; 
        let allActivities = {}; 
        let allFavorites = {}; 
        
        let modalState = { date: '', level: '' };
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); 
        
        let currentLearningBatch = [];
        let currentWordIndex = 0;

        let unsubUsers, unsubDates, unsubChat, unsubProfile, unsubVocab, unsubProgress, unsubActivity, unsubFav;

        // ==========================================
        //  輔助工具函式
        // ==========================================
        const getDaysLeft = (targetDateStr) => {
            const now = new Date();
            now.setHours(0,0,0,0);
            const target = new Date(targetDateStr);
            target.setHours(0,0,0,0);
            return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
        };

        const formatDate = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const getStoredConfig = () => {
            const stored = localStorage.getItem('study_group_firebase_config');
            if (stored) {
                try { return JSON.parse(stored); } catch(e) {}
            }
            if (typeof __firebase_config !== 'undefined') {
                try { return JSON.parse(__firebase_config); } catch(e) {}
            }
            return null;
        };

        const getAvatarChar = (u) => {
            if(usersProfile[u] && usersProfile[u].nickname) return usersProfile[u].nickname.charAt(0);
            return u ? u.charAt(0) : '?';
        };

        const getCircleNum = (idx) => {
            const nums = ['➀','➁','➂','➃','➄','➅','➆','➇','➈','➉','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
            return nums[idx] || `(${idx+1})`;
        };

        // ==========================================
        //  UI 渲染函式 - 系統框架與登入
        // ==========================================
        window.renderApp = () => { 
            document.getElementById('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col relative overflow-hidden bg-white/20"></div>`; 
            renderGlobalModals();
        };

        window.renderSetup = () => {
            const container = document.getElementById('view-container');
            const currentConfig = getStoredConfig() || {};
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">
                    <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] shadow-2xl z-10 w-[36rem] max-w-[95vw] border-4 border-teal-200 relative overflow-hidden">
                        <h1 class="text-2xl md:text-3xl font-black text-teal-600 mb-2 drop-shadow-sm text-center">⚙️ 系統資料庫設定</h1>
                        <p class="text-sm text-gray-500 mb-6 text-center font-bold">請填入您的 Firebase API Key 以啟用雲端同步功能</p>
                        <div class="space-y-3 bg-white/60 p-6 rounded-2xl border border-teal-100">
                            <div>
                                <label class="block text-xs font-bold text-teal-800 mb-1">API Key (必填) *</label>
                                <input type="text" id="cfg-apiKey" value="${currentConfig.apiKey || ''}" placeholder="AIzaSy..." class="w-full px-3 py-2 rounded-lg border border-teal-200 focus:outline-none focus:border-teal-400 text-sm font-mono">
                            </div>
                        </div>
                        <div class="mt-6 flex gap-3 justify-center">
                            ${currentConfig.apiKey ? `<button onclick="renderLogin()" class="px-5 py-2.5 rounded-xl font-bold text-gray-500 bg-gray-50 border border-gray-200 hover:bg-gray-100 transition-colors">取消</button>` : ''}
                            <button onclick="saveFirebaseConfig()" class="flex-1 bg-gradient-to-r from-teal-400 to-emerald-400 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:shadow-lg transition-all">
                                💾 儲存並啟動系統
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderLogin = () => {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">
                    <div class="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-2xl z-10 w-[36rem] max-w-[95vw] text-center border-4 border-teal-200 relative overflow-hidden">
                        <div class="absolute top-4 left-4 text-4xl animate-bounce-slow">📖</div>
                        <div class="absolute bottom-4 right-4 text-4xl animate-bounce-slow" style="animation-delay: 1s;">💡</div>
                        <button onclick="renderSetup()" class="absolute top-5 right-5 text-gray-400 hover:text-teal-600 transition-colors bg-white/50 p-2 rounded-full border border-gray-200 hover:bg-white" title="系統設定">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </button>

                        <h1 class="text-3xl md:text-4xl font-black text-teal-600 mb-3 drop-shadow-sm tracking-wide">📚 英文單字特訓班</h1>
                        <h2 class="text-xl font-bold text-indigo-500 mb-8 bg-indigo-50 inline-block px-6 py-2 rounded-full border border-indigo-100">Level 1 - 6 單字攻克 💯</h2>
                        
                        <div class="bg-white/60 p-6 rounded-3xl border border-teal-100 mb-6">
                            <p class="text-sm text-teal-600 font-bold mb-3">👇 點擊你的暱稱登入 👇</p>
                            <div class="flex flex-wrap justify-center gap-3">
                                ${globalUsers.length > 0 ? 
                                    globalUsers.map(u => {
                                        const dispName = usersProfile[u]?.nickname || u;
                                        return `<button onclick="initiateLogin('${u}')" class="flex items-center gap-2 text-md font-bold bg-white border-2 border-teal-200 text-teal-700 hover:bg-teal-50 hover:scale-105 py-1.5 pl-2 pr-4 rounded-xl shadow-sm transition-all">
                                            <div class="${getUserColor(u)} w-8 h-8 rounded-full flex items-center justify-center text-sm font-black shadow-sm border-2 border-white shrink-0">${getAvatarChar(u)}</div>
                                            <span>${dispName}</span>
                                        </button>`;
                                    }).join('') 
                                    : `<span class="text-sm text-gray-400">尚無學習者，請點擊下方註冊</span>`
                                }
                            </div>
                        </div>
                        
                        <div class="flex gap-2 w-full mt-2">
                            <button onclick="openProfileEditModal('', true)" class="w-full bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-black py-4 px-6 text-xl rounded-2xl shadow-md hover:shadow-lg transition-all transform hover:scale-[1.02]">
                                🚀 註冊新帳號
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="bg-white/80 backdrop-blur-md border-b-2 border-teal-200 p-3 flex justify-between items-center shadow-sm shrink-0 z-20 relative">
                    <div class="flex items-center gap-4 pl-2">
                        <h1 class="text-2xl md:text-3xl font-black text-teal-700 tracking-wider">📚 英文單字特訓班</h1>
                    </div>
                    <div class="flex items-center gap-2 md:gap-3 pr-2 flex-wrap justify-end">
                        ${isAdmin ? `<button onclick="window.open('migration_tool.html', '_blank')" class="bg-gradient-to-r from-amber-400 to-orange-400 text-white font-bold px-3 py-1.5 rounded-lg shadow-sm hover:scale-105 transition-transform text-sm shrink-0 hidden lg:block">⚙️ 題庫管理</button>` : ''}
                        ${isAdmin ? `<button onclick="openAdminPanel()" class="bg-gradient-to-r from-gray-500 to-gray-600 text-white font-bold px-3 py-1.5 rounded-lg shadow-sm hover:scale-105 transition-transform text-sm shrink-0 hidden lg:block">管理員設定</button>` : ''}
                        
                        <button onclick="openProgressModal()" class="font-bold text-orange-700 bg-orange-50 px-2 md:px-3 py-1.5 rounded-lg border border-orange-200 shadow-sm hover:bg-orange-100 transition-colors text-sm flex items-center gap-1 shrink-0">
                            📈 <span class="hidden md:inline">進度追蹤</span>
                        </button>
                        
                        <button onclick="openProfileEditModal('${username}')" class="font-bold text-teal-700 bg-teal-50 px-2 md:px-3 py-1.5 rounded-lg border border-teal-200 shadow-sm hover:bg-teal-100 transition-colors text-sm flex items-center gap-1 shrink-0">
                            <div class="${getUserColor(username)} w-5 h-5 rounded-full flex items-center justify-center text-[10px]">${getAvatarChar(username)}</div>
                            <span class="hidden md:inline">我的資料卡</span>
                        </button>
                        
                        <button onclick="logout()" class="text-rose-500 hover:bg-rose-50 font-bold px-2 md:px-3 py-1.5 rounded-lg transition-colors text-sm border border-rose-200 bg-white shadow-sm shrink-0">登出 👋</button>
                    </div>
                </div>

                <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                    <div class="w-full md:w-60 lg:w-72 flex flex-col bg-white/50 border-b-2 md:border-b-0 md:border-r-2 border-teal-100 z-10 shrink-0 h-full min-h-0">
                        <div id="sidebar-countdowns" class="p-4 flex flex-col border-b-2 border-teal-100 shrink-0 h-[45%] min-h-[250px] relative overflow-hidden"></div>
                        <div class="flex-1 flex flex-col bg-white/60 overflow-hidden relative min-h-0">
                            <div class="bg-teal-100/50 p-2 text-center font-bold text-teal-600 border-b border-teal-100 text-sm shadow-sm shrink-0">💬 加油打氣留言板</div>
                            <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar text-sm relative min-h-0"></div>
                            
                            <div class="p-2 bg-white flex flex-col border-t border-teal-100 relative shrink-0">
                                <div id="emoji-picker" class="hidden absolute bottom-full left-2 mb-2 bg-white border border-teal-200 p-2 rounded-xl shadow-lg grid grid-cols-5 gap-2 z-50">
                                    ${['😀','😂','🥰','😎','🥺','💪','🔥','💯','📚','🎓','✨','🎉','📝','🏆','💖'].map(e => `<button onclick="insertEmoji('${e}')" class="text-xl hover:scale-125 transition-transform">${e}</button>`).join('')}
                                </div>
                                <div class="flex gap-1.5 items-center w-full">
                                    <button id="emoji-toggle-btn" onclick="toggleEmojiPicker(event)" class="text-2xl hover:bg-teal-50 px-1 rounded-lg transition-colors shrink-0">😀</button>
                                    <div class="flex-1 min-w-0">
                                        <input type="text" id="chatInput" placeholder="說點什麼..." class="w-full px-3 py-2 rounded-lg border border-teal-200 focus:outline-none focus:border-teal-400 bg-gray-50 text-sm" onkeypress="if(event.key === 'Enter') sendChat()">
                                    </div>
                                    <button onclick="sendChat()" class="bg-teal-500 text-white px-3 py-2 rounded-lg font-bold hover:bg-teal-600 transition-colors shrink-0 whitespace-nowrap text-sm">送出</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex-1 bg-white/30 p-4 flex flex-col relative z-0 min-w-0">
                        <div class="flex justify-between items-center mb-4 bg-white/80 p-3 rounded-2xl border border-teal-100 shadow-sm shrink-0">
                            <button onclick="changeMonth(-1)" class="px-3 py-1.5 md:px-4 md:py-2 bg-teal-50 border border-teal-200 hover:bg-teal-100 text-teal-700 rounded-xl font-bold transition-colors shadow-sm text-sm md:text-base whitespace-nowrap">◀ 上個月</button>
                            <div class="flex flex-col items-center flex-1 mx-2 overflow-hidden" id="calendar-header-container"></div>
                            <button onclick="changeMonth(1)" class="px-3 py-1.5 md:px-4 md:py-2 bg-teal-50 border border-teal-200 hover:bg-teal-100 text-teal-700 rounded-xl font-bold transition-colors shadow-sm text-sm md:text-base whitespace-nowrap">下個月 ▶</button>
                        </div>

                    </div>

                    <div class="w-full md:w-60 lg:w-72 flex flex-col bg-white/60 z-10 shrink-0 border-l-2 border-rose-100 min-h-0 h-full">
                        <div class="bg-gradient-to-r from-rose-100 to-pink-100 p-2 text-center font-bold text-rose-600 shadow-sm shrink-0 text-sm flex justify-center items-center gap-1">❤️ 我的最愛單字</div>
                        <div id="favorites-feed" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar"></div>
                    </div>
                </div>
            `;
            if (username) {
                window.renderSidebar();
                window.renderMainContent();
                window.renderChat();
            }
        };

        // 全域 Modals 渲染
        const renderGlobalModals = () => {
            const container = document.getElementById('modals-container');
            container.innerHTML = `
                <!-- 輸入密碼登入 Modal -->
                <div id="login-pwd-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm hidden items-center justify-center z-[70] p-4 transition-opacity duration-200 opacity-0">
                    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden border-4 border-teal-200 transform scale-95 transition-transform duration-200 flex flex-col p-6">
                        <h2 class="text-2xl font-black text-teal-600 mb-4 text-center">🔐 安全登入</h2>
                        <p class="text-center font-bold text-gray-600 mb-4" id="login-pwd-username-display"></p>
                        <input type="hidden" id="login-pwd-username">
                        <input type="password" id="login-pwd-input" placeholder="請輸入密碼" class="w-full px-4 py-3 rounded-xl border-2 border-teal-200 focus:outline-none focus:border-teal-400 text-center font-bold text-lg mb-6" onkeypress="if(event.key === 'Enter') confirmLoginPassword()">
                        <div class="flex gap-3">
                            <button onclick="closeGlobalModal('login-pwd-modal')" class="flex-1 px-4 py-2.5 rounded-xl font-bold text-gray-500 bg-gray-50 border border-gray-200 hover:bg-gray-100">取消</button>
                            <button onclick="confirmLoginPassword()" class="flex-1 px-4 py-2.5 rounded-xl font-bold text-white bg-teal-500 hover:bg-teal-600 shadow-md">登入</button>
                        </div>
                    </div>
                </div>

                <!-- 註冊/編輯個人資料卡 Modal -->
                <div id="profile-edit-modal" class="fixed inset-0 bg-gray-900/70 backdrop-blur-sm hidden items-center justify-center z-[80] p-4 transition-opacity duration-200 opacity-0">

                            <h2 class="text-xl font-bold" id="profile-modal-title">📝 設定專屬資料卡</h2>

                            <div>
                                <label class="block text-teal-800 font-bold mb-1 text-sm">真實姓名 (登入帳號) <span class="text-red-500">*</span></label>
                                <input type="text" id="prof-name" placeholder="請輸入真實姓名" class="w-full px-3 py-2 rounded-lg border-2 border-teal-200 bg-white focus:outline-none focus:border-teal-400 font-bold text-gray-700">
                            </div>

        window.openGlobalModal = (id) => {
            const modal = document.getElementById(id);

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const inner = modal.firstElementChild;
                if(inner.classList.contains('scale-95')) inner.classList.remove('scale-95');
            }, 10);
        };

        window.closeGlobalModal = (id) => {
            const modal = document.getElementById(id);
            if(!modal) return;
            modal.classList.add('opacity-0');
            const inner = modal.firstElementChild;
            if(inner && inner.classList.contains('scale-95') === false) inner.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        // ==========================================
        //  進度追蹤 Modal 邏輯
        // ==========================================
        window.openProgressModal = () => {
            const targetUser = viewingUser === 'ALL' ? username : viewingUser;
            if (!targetUser) return;
            const dispName = usersProfile[targetUser]?.nickname || targetUser;
            document.getElementById('progress-user-name').innerText = `📈 ${dispName} 的單字進度`;

            let html = '<div class="space-y-4">';
            LEVELS.forEach(lvl => {
                const levelWords = Object.values(allVocab).filter(v => v.level === lvl);
                const totalWords = levelWords.length;
                const progressDocId = `${targetUser}_${lvl}`;
                const learnedWords = allProgress[progressDocId]?.lastIndex || 0;
                
                const percent = totalWords > 0 ? Math.min(100, Math.round((learnedWords / totalWords) * 100)) : 0;
                
                html += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-orange-100">
                        <div class="flex justify-between items-end mb-2">
                            <h4 class="font-black text-lg text-orange-700">${lvl}</h4>
                            <span class="text-sm font-bold text-gray-500">${learnedWords} / ${totalWords} 字</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden border border-gray-200">
                            <div class="bg-gradient-to-r from-orange-400 to-amber-500 h-4 rounded-full transition-all duration-500" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            document.getElementById('progress-content').innerHTML = html;
            openGlobalModal('progress-modal');
        };

        // ==========================================

        window.saveFirebaseConfig = () => {
            const apiKey = document.getElementById('cfg-apiKey').value.trim();
            if (!apiKey) return alert("API Key 為必填欄位！");
            localStorage.setItem('study_group_firebase_config', JSON.stringify({ apiKey }));
            alert("設定已儲存！系統將重新啟動。");
            window.location.reload(); 
        };

        window.logout = () => {
            username = ''; viewingUser = 'ALL'; isAdmin = false;
            localStorage.removeItem('study_group_user');
            
            if(unsubDates) unsubDates();
            if(unsubChat) unsubChat();
            if(unsubUsers) unsubUsers();
            if(unsubProfile) unsubProfile();
            if(unsubVocab) unsubVocab();
            if(unsubProgress) unsubProgress();
            if(unsubActivity) unsubActivity();
            if(unsubFav) unsubFav();
            
            chatMessages = []; importantDates = [];
            allVocab = {}; allProgress = {}; allActivities = {}; allFavorites = {};
            
            setupLoginListener();
            window.renderLogin();
        };

        window.sendChat = async () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if(!text) return;
            
            const newMsg = { user: username, text: text, timestamp: new Date().toISOString() };
            const newChat = [...chatMessages, newMsg];
            if(newChat.length > 50) newChat.shift();
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat'), { messages: newChat });
            input.value = '';
        };

        window.insertEmoji = (emoji) => {
            const input = document.getElementById('chatInput');

            document.getElementById('emoji-picker').classList.add('hidden');

        window.toggleEmojiPicker = (e) => {
            e.stopPropagation();

            picker.classList.toggle('hidden');
        };

        document.addEventListener('click', (e) => {
            const emojiPicker = document.getElementById('emoji-picker');
            const toggleBtn = document.getElementById('emoji-toggle-btn');

                if (!emojiPicker.contains(e.target) && e.target !== toggleBtn) emojiPicker.classList.add('hidden');

        // ==========================================

        window.initiateLogin = (name) => {
            const trimmed = name.trim();
            if(!trimmed) return alert("請傳入名稱！");
            
            if (globalUsers.includes(trimmed) && usersProfile[trimmed]) {
                document.getElementById('login-pwd-username').value = trimmed;

                document.getElementById('login-pwd-username-display').innerText = `你好，${dispName}！請輸入密碼以繼續：`;

                setTimeout(() => document.getElementById('login-pwd-input').focus(), 100);
            }
        };

        window.confirmLoginPassword = () => {
            const name = document.getElementById('login-pwd-username').value;
            const pwd = document.getElementById('login-pwd-input').value;
            if (name === 'Nick' && pwd !== '2iligloi') return alert("Nick 為管理員保留帳號，密碼錯誤！");
            if (usersProfile[name] && usersProfile[name].password !== pwd) return alert("密碼錯誤，請重試！");
            
            closeGlobalModal('login-pwd-modal');
            doCompleteLogin(name);
        };

        window.openProfileEditModal = (name = '', isRegister = false) => {
            const nameInput = document.getElementById('prof-name');

            if (isRegister && !name) {
                nameInput.disabled = false;
                nameInput.classList.remove('bg-gray-100', 'text-gray-500');
                nameInput.classList.add('bg-white', 'text-gray-700');
                nameInput.placeholder = "請輸入真實姓名作為登入帳號";

                nameInput.disabled = true;
                nameInput.classList.remove('bg-white', 'text-gray-700');
                nameInput.classList.add('bg-gray-100', 'text-gray-500');
                nameInput.placeholder = "";
            }
            
            const isNick = (name === 'Nick');
            const currentPwd = usersProfile[name]?.password || (isNick ? '2iligloi' : '');
            document.getElementById('prof-pwd').value = currentPwd;
            document.getElementById('prof-pwd-confirm').value = currentPwd;

            if (isNick && isRegister) {

                document.getElementById('prof-pwd-confirm').disabled = false;
                document.getElementById('pwd-hint').innerText = "";
            }

            document.getElementById('prof-nickname').value = usersProfile[name]?.nickname || name;
            document.getElementById('prof-birthday').value = usersProfile[name]?.birthday || '';
            document.getElementById('prof-target').value = usersProfile[name]?.target || '';
            document.getElementById('prof-motto').value = usersProfile[name]?.motto || '';
            
            let photo = usersProfile[name]?.photo || '';
            document.getElementById('prof-photo-upload').dataset.base64 = photo;
            
            if (photo) {
                document.getElementById('prof-photo-preview').src = photo;
                document.getElementById('prof-photo-preview').classList.remove('hidden');
                document.getElementById('prof-photo-placeholder').classList.add('hidden');
            } else {
                document.getElementById('prof-photo-preview').classList.add('hidden');
                document.getElementById('prof-photo-placeholder').classList.remove('hidden');
            }

            document.getElementById('profile-modal-title').innerText = isRegister ? '🚀 歡迎加入！請建立專屬資料卡' : '📝 修改我的資料卡';
            document.getElementById('profile-modal-close').style.display = isRegister ? 'none' : 'flex'; 
            
            openGlobalModal('profile-edit-modal');
        };

        window.handleProfilePhoto = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('prof-photo-upload').dataset.base64 = base64;
                    document.getElementById('prof-photo-preview').src = base64;
                    document.getElementById('prof-photo-preview').classList.remove('hidden');
                    document.getElementById('prof-photo-placeholder').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.saveProfile = async () => {
            const nameInput = document.getElementById('prof-name');
            const name = nameInput.value.trim();
            const pwd = document.getElementById('prof-pwd').value.trim();
            const pwdConfirm = document.getElementById('prof-pwd-confirm').value.trim();
            const nickname = document.getElementById('prof-nickname').value.trim();
            
            if(!name) return alert("請輸入真實姓名作為登入帳號！");
            if(!pwd) return alert("請務必設定登入密碼！");
            if(pwd !== pwdConfirm) return alert("兩次輸入的密碼不一致，請重新檢查！");
            if(!nickname) return alert("請輸入顯示暱稱！");

            const isNewUser = !globalUsers.includes(name);

            if (!nameInput.disabled && !isNewUser) {
                return alert("此真實姓名已存在，請使用該名稱登入，或輸入另一個姓名！");

            const realIndex = importantDates.findIndex(d => d.title === item.title && d.date === item.date);

                        user: username,
                        level: modalState.level,
                        lastIndex: newIndex,
                        updatedAt: new Date().toISOString()
                    }, { merge: true });
                    
                    const activityId = `${username}_${modalState.date}_${Date.now()}`;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabActivity', activityId), {
                        user: username,
                        date: modalState.date,
                        level: modalState.level,
                        wordsLearned: currentLearningBatch.length,
                        timestamp: new Date().toISOString()
                    });

                    alert(`🎉 恭喜完成本批次 ${currentLearningBatch.length} 個單字！進度已更新。`);
                    closeGlobalModal('learning-modal');
                } catch(e) {
                    console.error(e);
                    alert("儲存進度失敗，請檢查網路連線。");
                }
            } else {
                currentWordIndex++;
                renderLearningWord();
            }
        };

        window.playAudio = (text, e) => {
            if(e) e.stopPropagation();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            speechSynthesis.speak(utterance);
        };

        window.toggleFavorite = async (wordId, e) => {
            if(e) e.stopPropagation();
            const favId = `${username}_${wordId}`;
            try {
                if(allFavorites[favId]) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabFavorites', favId));
                } else {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabFavorites', favId), {
                        user: username,
                        wordId: wordId,
                        addedAt: new Date().toISOString()
                    });
                }
            } catch(err) { console.error(err); }
        };

        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if (username && !globalUsers.includes(username)) {
                    alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！');
                    window.logout(); 
                }
            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(username) window.renderMainContent();
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2027-05-22', title: '國中教育會考' },
                        { date: '2026-09-09', title: '第1次模擬考' },
                        { date: '2026-10-13', title: '第1次段考' },
                        { date: '2026-10-28', title: '第2次模擬考' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) window.renderSidebar();
                if(isAdmin && !document.getElementById('admin-panel-modal').classList.contains('hidden')) window.renderAdminDates();
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) window.renderChat();
            }, errHandler);

            // 題庫資料監聽
            const vocabCol = collection(db, 'artifacts', appId, 'public', 'data', 'Vocab');
            if(unsubVocab) unsubVocab();
            unsubVocab = onSnapshot(vocabCol, (snap) => {
                allVocab = {};
                snap.forEach(docSnap => allVocab[docSnap.id] = docSnap.data());
                // Refresh progress modal if open
                if(username && document.getElementById('progress-modal') && !document.getElementById('progress-modal').classList.contains('hidden')) window.openProgressModal();
            }, errHandler);

            // 學習進度監聽
            const progressCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabProgress');
            if(unsubProgress) unsubProgress();
            unsubProgress = onSnapshot(progressCol, (snap) => {
                allProgress = {};
                snap.forEach(docSnap => allProgress[docSnap.id] = docSnap.data());
                if(username && document.getElementById('progress-modal') && !document.getElementById('progress-modal').classList.contains('hidden')) window.openProgressModal();
            }, errHandler);

            // 活動紀錄監聽 (日曆顯示用)
            const activityCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabActivity');
            if(unsubActivity) unsubActivity();
            unsubActivity = onSnapshot(activityCol, (snap) => {
                allActivities = {};
                snap.forEach(docSnap => allActivities[docSnap.id] = docSnap.data());
                if(username) window.renderMainContent();
            }, errHandler);

            // 最愛單字監聽
            const favCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabFavorites');
            if(unsubFav) unsubFav();
            unsubFav = onSnapshot(favCol, (snap) => {
                allFavorites = {};
                snap.forEach(docSnap => allFavorites[docSnap.id] = docSnap.data());
                if(username) {
                    window.renderFavorites();
                    const learningModal = document.getElementById('learning-modal');
                    if(learningModal && !learningModal.classList.contains('hidden')) window.renderLearningWord();
                }
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            doCompleteLogin(savedUser); 
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        initApp();

    </script>
</body>
</html>
