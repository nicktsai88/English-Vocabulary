<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 英文單字特訓班 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%; 
            height: -webkit-fill-available;
            height: 100dvh;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Varela Round', 'Noto Sans TC', sans-serif;
            background-color: #fffafb;
            background-image: 
                radial-gradient(#fce7f3 2px, transparent 2px),
                radial-gradient(#fbcfe8 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #334155;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 3px solid #fce7f3;
            box-shadow: 0 8px 32px rgba(244, 63, 94, 0.15);
        }

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(251, 113, 133, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(244, 63, 94, 0.8); }

        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }

        @keyframes marqueeVertical {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .marquee-container {
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            animation: marqueeVertical 15s linear infinite;
        }
        .marquee-container:hover .marquee-content, 
        .marquee-container:active .marquee-content {
            animation-play-state: paused;
        }
        
        .chat-bubble-me { background: #ffe4e6; border-radius: 1rem 1rem 0 1rem; }
        .chat-bubble-other { background: #fce7f3; border-radius: 1rem 1rem 1rem 0; }
    </style>

    <script type="application/json" id="app-data">
    {
      "EXAM_DATE": "2027-05-22T00:00:00",
      "LEVELS": ["Level 1", "Level 2", "Level 3", "Level 4", "Level 5", "Level 6"]
    }
    </script>
</head>
<body class="w-full flex flex-col overflow-hidden">

    <div id="app" class="w-full h-full flex flex-col overflow-hidden"></div>
    <div id="modals-container"></div> 

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        //  系統設定與常數
        // ==========================================
        const BASE_FIREBASE_CONFIG = {
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'english-vocabulary';
        
        const appDataRaw = document.getElementById('app-data').textContent;
        const appData = JSON.parse(appDataRaw);
        
        const EXAM_DATE = new Date(appData.EXAM_DATE);
        const LEVELS = appData.LEVELS;

        const USER_COLORS = [
            'bg-[#4F46E5] text-white', 'bg-[#EC4899] text-white', 'bg-[#06B6D4] text-white',
            'bg-[#F59E0B] text-white', 'bg-[#10B981] text-white', 'bg-[#8B5CF6] text-white',
            'bg-[#3B82F6] text-white', 'bg-[#EF4444] text-white', 'bg-[#14B8A6] text-white',
            'bg-[#F43F5E] text-white'
        ];
        
        const getUserColor = (name) => {
            if(!name) return USER_COLORS[0];
            if(usersProfile[name] && usersProfile[name].color) return usersProfile[name].color;
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
        };

        // 資料狀態
        let appInstance, auth, db;
        let currentUser = null;
        let username = '';
        let viewingUser = 'ALL'; 
        let isAdmin = false;
        
        let globalUsers = [];
        let importantDates = [];
        let chatMessages = [];
        let usersProfile = {}; 
        
        let allVocab = {}; 
        let allProgress = {}; 
        let allActivities = {}; 
        let allFavorites = {}; 
        
        let modalState = { date: '', level: '' };
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); 
        
        let currentLearningBatch = []; // 最多 30 個
        let currentPageIndex = 0;      // 0, 1, 2 (每頁 10 個)
        let isReviewMode = false;

        let unsubUsers, unsubDates, unsubChat, unsubProfile, unsubVocab, unsubProgress, unsubActivity, unsubFav;
        
        // 女性/真人語音設定
        let femaleVoice = null;

        // ==========================================
        //  輔助工具函式
        // ==========================================
        const getDaysLeft = (targetDateStr) => {
            const now = new Date();
            now.setHours(0,0,0,0);
            const target = new Date(targetDateStr);
            target.setHours(0,0,0,0);
            return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
        };

        const formatDate = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const getStoredConfig = () => {
            const stored = localStorage.getItem('study_group_firebase_config');
            if (stored) { try { return JSON.parse(stored); } catch(e) {} }
            if (typeof __firebase_config !== 'undefined') { try { return JSON.parse(__firebase_config); } catch(e) {} }
            return null;
        };

        const getAvatarChar = (u) => {
            if(usersProfile[u] && usersProfile[u].nickname) return usersProfile[u].nickname.charAt(0);
            return u ? u.charAt(0) : '?';
        };

        const getCircleNum = (idx) => {
            const nums = ['➀','➁','➂','➃','➄','➅','➆','➇','➈','➉','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
            return nums[idx] || `(${idx+1})`;
        };

        const escapeQuotes = (str) => {
            if(!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        };

        const initVoice = () => {
            const voices = speechSynthesis.getVoices();
            femaleVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google US English')) ||
                          voices.find(v => v.lang.startsWith('en') && v.name.includes('Samantha')) ||
                          voices.find(v => v.lang.startsWith('en') && v.name.includes('Zira')) ||
                          voices.find(v => v.lang.startsWith('en') && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('girl'))) ||
                          voices.find(v => v.lang.startsWith('en-US')) || 
                          voices.find(v => v.lang.startsWith('en'));
        };
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = initVoice;
        }

        // ==========================================
        //  UI 渲染函式 - 系統框架與登入
        // ==========================================
        window.renderApp = () => { 
            document.getElementById('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col relative overflow-hidden bg-white/20"></div>`; 
            renderGlobalModals();
        };

        window.renderSetup = () => {
            const container = document.getElementById('view-container');
            const currentConfig = getStoredConfig() || {};
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">
                    <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] shadow-2xl z-10 w-[36rem] max-w-[95vw] border-4 border-rose-200 relative overflow-hidden">
                        <h1 class="text-2xl md:text-3xl font-black text-rose-600 mb-2 drop-shadow-sm text-center">⚙️ 系統資料庫設定</h1>
                        <p class="text-sm text-gray-500 mb-6 text-center font-bold">請填入您的 Firebase API Key 以啟用雲端同步功能</p>
                        <div class="space-y-3 bg-white/60 p-6 rounded-2xl border border-rose-100">
                            <div>
                                <label class="block text-xs font-bold text-rose-800 mb-1">API Key (必填) *</label>
                                <input type="text" id="cfg-apiKey" value="${currentConfig.apiKey || ''}" placeholder="AIzaSy..." class="w-full px-3 py-2 rounded-lg border border-rose-200 focus:outline-none focus:border-rose-400 text-sm font-mono">
                            </div>
                        </div>
                        <div class="mt-6 flex gap-3 justify-center">
                            ${currentConfig.apiKey ? `<button onclick="renderLogin()" class="px-5 py-2.5 rounded-xl font-bold text-gray-500 bg-gray-50 border border-gray-200 hover:bg-gray-100 transition-colors">取消</button>` : ''}
                            <button onclick="saveFirebaseConfig()" class="flex-1 bg-gradient-to-r from-rose-400 to-pink-500 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:shadow-lg transition-all">
                                💾 儲存並啟動系統
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderLogin = () => {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">
                    <div class="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-2xl z-10 w-[36rem] max-w-[95vw] text-center border-4 border-rose-200 relative overflow-hidden">
                        <div class="absolute top-4 left-4 text-4xl animate-bounce-slow">🌸</div>
                        <div class="absolute bottom-4 right-4 text-4xl animate-bounce-slow" style="animation-delay: 1s;">📖</div>
                        <button onclick="renderSetup()" class="absolute top-5 right-5 text-gray-400 hover:text-rose-600 transition-colors bg-white/50 p-2 rounded-full border border-gray-200 hover:bg-white" title="系統設定">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </button>

                        <h1 class="text-3xl md:text-4xl font-black text-rose-600 mb-3 drop-shadow-sm tracking-wide">🌸 英文單字特訓班</h1>
                        <h2 class="text-xl font-bold text-pink-600 mb-8 bg-pink-50 inline-block px-6 py-2 rounded-full border border-pink-100">Level 1 - 6 單字攻克 💯</h2>
                        
                        <div class="bg-white/60 p-6 rounded-3xl border border-rose-100 mb-6">
                            <p class="text-sm text-rose-500 font-bold mb-3">👇 點擊你的暱稱登入 👇</p>
                            <div class="flex flex-wrap justify-center gap-3">
                                ${globalUsers.length > 0 ? 
                                    globalUsers.map(u => {
                                        const dispName = usersProfile[u]?.nickname || u;
                                        return `<button onclick="initiateLogin('${u}')" class="flex items-center gap-2 text-md font-bold bg-white border-2 border-rose-200 text-rose-600 hover:bg-rose-50 hover:scale-105 py-1.5 pl-2 pr-4 rounded-xl shadow-sm transition-all">
                                            <div class="${getUserColor(u)} w-8 h-8 rounded-full flex items-center justify-center text-sm font-black shadow-sm border-2 border-white shrink-0">${getAvatarChar(u)}</div>
                                            <span>${dispName}</span>
                                        </button>`;
                                    }).join('') 
                                    : `<span class="text-sm text-gray-400">尚無學習者，請點擊下方註冊</span>`
                                }
                            </div>
                        </div>
                        
                        <div class="flex gap-2 w-full mt-2">
                            <button onclick="openProfileEditModal('', true)" class="w-full bg-gradient-to-r from-rose-400 to-pink-500 text-white font-black py-4 px-6 text-xl rounded-2xl shadow-md hover:shadow-lg transition-all transform hover:scale-[1.02]">
                                🚀 註冊新帳號
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="bg-white/80 backdrop-blur-md border-b-2 border-rose-100 p-3 flex justify-between items-center shadow-sm shrink-0 z-20 relative">
                    <div class="flex items-center gap-4 pl-2">
                        <h1 class="text-2xl md:text-3xl font-black text-rose-600 tracking-wider">🌸 英文單字特訓班</h1>
                    </div>
                    <div class="flex items-center gap-2 md:gap-3 pr-2 flex-wrap justify-end">
                        ${isAdmin ? `<button onclick="window.open('migration_tool.html', '_blank')" class="bg-gradient-to-r from-amber-400 to-orange-400 text-white font-bold px-3 py-1.5 rounded-lg shadow-sm hover:scale-105 transition-transform text-sm shrink-0 hidden lg:block">⚙️ 題庫管理</button>` : ''}
                        
                        <button onclick="openProgressModal()" class="font-bold text-orange-700 bg-orange-50 px-2 md:px-3 py-1.5 rounded-lg border border-orange-200 shadow-sm hover:bg-orange-100 transition-colors text-sm flex items-center gap-1 shrink-0">
                            📈 <span class="hidden md:inline">進度追蹤</span>
                        </button>
                        
                        <button onclick="openProfileEditModal('${username}')" class="font-bold text-rose-700 bg-rose-50 px-2 md:px-3 py-1.5 rounded-lg border border-rose-200 shadow-sm hover:bg-rose-100 transition-colors text-sm flex items-center gap-1 shrink-0">
                            <div class="${getUserColor(username)} w-5 h-5 rounded-full flex items-center justify-center text-[10px]">${getAvatarChar(username)}</div>
                            <span class="hidden md:inline">我的資料卡</span>
                        </button>
                        
                        <button onclick="logout()" class="text-gray-500 hover:bg-gray-50 font-bold px-2 md:px-3 py-1.5 rounded-lg transition-colors text-sm border border-gray-200 bg-white shadow-sm shrink-0">登出 👋</button>
                    </div>
                </div>

                <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                    <div class="w-full md:w-60 lg:w-72 flex flex-col bg-white/50 border-b-2 md:border-b-0 md:border-r-2 border-rose-100 z-10 shrink-0 h-full min-h-0">
                        <div id="sidebar-countdowns" class="p-4 flex flex-col border-b-2 border-rose-100 shrink-0 h-[45%] min-h-[250px] relative overflow-hidden"></div>
                        <div class="flex-1 flex flex-col bg-white/60 overflow-hidden relative min-h-0">
                            <div class="bg-rose-100/50 p-2 text-center font-bold text-rose-600 border-b border-rose-100 text-sm shadow-sm shrink-0">💬 加油打氣留言板</div>
                            <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar text-sm relative min-h-0"></div>
                            
                            <div class="p-2 bg-white flex flex-col border-t border-rose-100 relative shrink-0">
                                <div id="emoji-picker" class="hidden absolute bottom-full left-2 mb-2 bg-white border border-rose-200 p-2 rounded-xl shadow-lg grid grid-cols-5 gap-2 z-50">
                                    ${['😀','😂','🥰','😎','🥺','💪','🔥','💯','📚','🎓','✨','🎉','📝','🏆','💖'].map(e => `<button onclick="insertEmoji('${e}')" class="text-xl hover:scale-125 transition-transform">${e}</button>`).join('')}
                                </div>
                                <div class="flex gap-1.5 items-center w-full">
                                    <button id="emoji-toggle-btn" onclick="toggleEmojiPicker(event)" class="text-2xl hover:bg-rose-50 px-1 rounded-lg transition-colors shrink-0">😀</button>
                                    <div class="flex-1 min-w-0">
                                        <input type="text" id="chatInput" placeholder="說點什麼..." class="w-full px-3 py-2 rounded-lg border border-rose-200 focus:outline-none focus:border-rose-400 bg-gray-50 text-sm" onkeypress="if(event.key === 'Enter') sendChat()">
                                    </div>

                            <button onclick="changeMonth(-1)" class="px-3 py-1.5 md:px-4 md:py-2 bg-rose-50 border border-rose-200 hover:bg-rose-100 text-rose-600 rounded-xl font-bold transition-colors shadow-sm text-sm md:text-base whitespace-nowrap">◀ 上個月</button>
                            <div class="flex flex-col items-center flex-1 mx-2 overflow-hidden" id="calendar-header-container"></div>
                            <button onclick="changeMonth(1)" class="px-3 py-1.5 md:px-4 md:py-2 bg-rose-50 border border-rose-200 hover:bg-rose-100 text-rose-600 rounded-xl font-bold transition-colors shadow-sm text-sm md:text-base whitespace-nowrap">下個月 ▶</button>

                        <div id="favorites-feed" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar"></div>
                    </div>
                </div>
            `;
            if (username) {
                window.renderSidebar();
                window.renderMainContent();
                window.renderChat();
            }
        };

        // 全域 Modals 渲染
        const renderGlobalModals = () => {
            const container = document.getElementById('modals-container');
            container.innerHTML = `
                <!-- 輸入密碼登入 Modal -->
                <div id="login-pwd-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm hidden items-center justify-center z-[70] p-4 transition-opacity duration-200 opacity-0">

                        <div class="flex gap-3">
                            <button onclick="closeGlobalModal('login-pwd-modal')" class="flex-1 px-4 py-2.5 rounded-xl font-bold text-gray-500 bg-gray-50 border border-gray-200 hover:bg-gray-100">取消</button>
                            <button onclick="confirmLoginPassword()" class="flex-1 px-4 py-2.5 rounded-xl font-bold text-white bg-rose-400 hover:bg-rose-500 shadow-md">登入</button>

                </div>

                if(inner.classList.contains('scale-95')) inner.classList.remove('scale-95');
            }, 10);

                const learnedWords = allProgress[progressDocId]?.lastIndex || 0;
                
                const percent = totalWords > 0 ? Math.min(100, Math.round((learnedWords / totalWords) * 100)) : 0;
                
                html += `

            } else {
                html = levelWords.map(wordObj => {
                    const favId = `${username}_${wordObj.id}`;
                    const isFav = !!allFavorites[favId];
                    const safeWord = escapeQuotes(wordObj.word);
                    const safeSentence = escapeQuotes(wordObj.sentence);
                    return `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-rose-100 flex flex-col md:flex-row gap-4 items-start md:items-center relative group">

        window.handleProfilePhoto = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);

            const levelWords = Object.values(allVocab).filter(v => v.level === level).sort((a,b) => a.index - b.index);

        window.startReview = (level) => {
            const levelWords = Object.values(allVocab).filter(v => v.level === level);

        window.startEbbinghausReview = (level) => {
            const progressDocId = `${username}_${level}`;
            const learned = allProgress[progressDocId]?.lastIndex || 0;
            const levelWords = Object.values(allVocab).filter(v => v.level === level).sort((a,b) => a.index - b.index);
            
            if(learned === 0) return alert("您尚未在此等級學習任何單字，請先開始學習！");
            
            let pool = levelWords.slice(0, learned);
            let reviewBatch = [];
            
            if (pool.length <= 30) {
                // 如果學過的單字不足 30 個，直接全部洗牌複習
                reviewBatch = pool.sort(() => 0.5 - Math.random());
            } else {
                // 簡易版艾賓浩斯學習曲線選詞法
                // 1. 最近學過的單字 (記憶容易模糊，需短期強化) - 取 40% (12字)
                // 2. 最早學過的單字 (需喚醒長期記憶) - 取 30% (9字)
                // 3. 中間學過的單字 - 取 30% (9字)
                let newestPool = pool.slice(-30);
                let oldestPool = pool.slice(0, 30);
                let midPool = pool.slice(30, -30);
                
                let newest = newestPool.sort(() => 0.5 - Math.random()).slice(0, 12);
                let oldest = oldestPool.sort(() => 0.5 - Math.random()).slice(0, 9);
                let mid = midPool.length > 0 ? midPool.sort(() => 0.5 - Math.random()).slice(0, 9) : [];
                
                reviewBatch = [...newest, ...oldest, ...mid];
                
                // 如果不足 30 字，從剩餘的池子中隨機補滿
                if(reviewBatch.length < 30) {
                    let remaining = pool.filter(w => !reviewBatch.includes(w)).sort(() => 0.5 - Math.random());
                    reviewBatch = [...reviewBatch, ...remaining.slice(0, 30 - reviewBatch.length)];
                }
                
                // 最後將這 30 個字打亂，避免使用者猜出規律
                reviewBatch = reviewBatch.sort(() => 0.5 - Math.random());
            }
            
            currentLearningBatch = reviewBatch;
            currentPageIndex = 0;
            isReviewMode = true;
            modalState.level = level;
            
            document.getElementById('learning-modal-title-badge').innerText = `${level} (艾賓浩斯智能複習 ${currentLearningBatch.length} 字)`;

            renderLearningPage();
            openGlobalModal('learning-modal');
        };

                html += `

                        </button>
                        
                        <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4 mt-6 mb-3">
                            <div class="flex items-center gap-3">
                                <button onclick="playAudio('${safeWord}', event)" class="w-10 h-10 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center hover:bg-rose-100 transition-colors shadow-sm shrink-0 border border-rose-200">
                                    🔊
                                </button>
                                <h3 class="text-2xl font-black text-gray-800">${wordObj.word}</h3>
                            </div>
                            <div class="text-rose-600 font-bold ml-1 md:ml-2">
                                <span class="text-gray-400 mr-1">${wordObj.pos}</span> ${wordObj.meaning}
                            </div>

                        ${wordObj.sentence ? `

            document.getElementById('learning-content').innerHTML = html;
            
            const totalPages = Math.ceil(currentLearningBatch.length / 10);

            document.getElementById('learning-content').scrollTop = 0;

                            user: username,
                            level: modalState.level,
                            lastIndex: newIndex,
                            updatedAt: new Date().toISOString()
                        }, { merge: true });
                        
                        const activityId = `${username}_${modalState.date}_${Date.now()}`;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabActivity', activityId), {
                            user: username,
                            date: modalState.date,
                            level: modalState.level,
                            wordsLearned: currentLearningBatch.length,
                            timestamp: new Date().toISOString()
                        });
                    } catch(e) {
                        console.error(e);
                        alert("儲存進度失敗，請檢查網路連線。");
                        return;
                    }
                }
                
                closeGlobalModal('learning-modal');
                openGlobalModal('complete-modal');
                
            } else {
                currentPageIndex++;
                renderLearningPage();
            }
        };

        // 使用設定好的女性/真人語音發音
        window.playAudio = (text, e) => {
            if(e) e.stopPropagation();
            if(!text) return;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            if (femaleVoice) {
                utterance.voice = femaleVoice;
            }
            // 可以稍微調整語速和音調讓它更自然
            utterance.rate = 0.9;
            utterance.pitch = 1.1; 
            
            speechSynthesis.speak(utterance);
        };

        window.toggleFavorite = async (wordId, e) => {
            if(e) e.stopPropagation();
            const favId = `${username}_${wordId}`;
            try {
                if(allFavorites[favId]) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabFavorites', favId));
                } else {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabFavorites', favId), {
                        user: username,
                        wordId: wordId,
                        addedAt: new Date().toISOString()
                    });
                }
            } catch(err) { console.error(err); }
        };

        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if (username && !globalUsers.includes(username)) {
                    alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！');
                    window.logout(); 
                }
            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(username) window.renderMainContent();
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2027-05-22', title: '國中教育會考' },
                        { date: '2026-09-09', title: '第1次模擬考' },
                        { date: '2026-10-13', title: '第1次段考' },
                        { date: '2026-10-28', title: '第2次模擬考' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) window.renderSidebar();
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) window.renderChat();
            }, errHandler);

            // 題庫資料監聽
            const vocabCol = collection(db, 'artifacts', appId, 'public', 'data', 'Vocab');
            if(unsubVocab) unsubVocab();
            unsubVocab = onSnapshot(vocabCol, (snap) => {
                allVocab = {};
                snap.forEach(docSnap => allVocab[docSnap.id] = docSnap.data());
                // Refresh progress modal if open
                if(username && document.getElementById('progress-modal') && !document.getElementById('progress-modal').classList.contains('hidden')) window.openProgressModal();
                if(username && document.getElementById('waterfall-modal') && !document.getElementById('waterfall-modal').classList.contains('hidden')) {
                    const title = document.getElementById('waterfall-title').innerText;
                    if(title) window.openWaterfall(title);
                }
            }, errHandler);

            // 學習進度監聽
            const progressCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabProgress');
            if(unsubProgress) unsubProgress();
            unsubProgress = onSnapshot(progressCol, (snap) => {
                allProgress = {};
                snap.forEach(docSnap => allProgress[docSnap.id] = docSnap.data());
                if(username && document.getElementById('progress-modal') && !document.getElementById('progress-modal').classList.contains('hidden')) window.openProgressModal();
            }, errHandler);

            // 活動紀錄監聽 (日曆顯示用)
            const activityCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabActivity');
            if(unsubActivity) unsubActivity();
            unsubActivity = onSnapshot(activityCol, (snap) => {
                allActivities = {};
                snap.forEach(docSnap => allActivities[docSnap.id] = docSnap.data());
                if(username) window.renderMainContent();
            }, errHandler);

            // 最愛單字監聽
            const favCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabFavorites');
            if(unsubFav) unsubFav();
            unsubFav = onSnapshot(favCol, (snap) => {
                allFavorites = {};
                snap.forEach(docSnap => allFavorites[docSnap.id] = docSnap.data());
                if(username) {
                    window.renderFavorites();
                    const learningModal = document.getElementById('learning-modal');
                    if(learningModal && !learningModal.classList.contains('hidden')) window.renderLearningPage();
                    const waterfallModal = document.getElementById('waterfall-modal');
                    if(waterfallModal && !waterfallModal.classList.contains('hidden')) {
                        const title = document.getElementById('waterfall-title').innerText;
                        if(title) window.openWaterfall(title);
                    }
                }
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            
            // 初始化發音語音
            initVoice();

            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            doCompleteLogin(savedUser); 
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        initApp();

    </script>
</body>
</html>
